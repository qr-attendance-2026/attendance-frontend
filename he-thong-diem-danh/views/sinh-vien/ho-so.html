<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hồ sơ</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../public/css/trang-chu.css">
    <link rel="stylesheet" href="../../public/css/ho-so.css">

       <!-- 🔥 FIX SIDEBAR -->
    <link rel="stylesheet" href="../../public/css/trang-chu.css">

  
</head>

</head>

<body class="bg-main">

<div class="d-flex">

    <!-- SIDEBAR GIỮ NGUYÊN -->
    <div id="sidebar-container"></div>

    <div class="content w-100 text-white">

        <div class="container-fluid p-4">

            <h3 class="fw-bold">Hồ sơ cá nhân</h3>
            <small class="text-light opacity-75">
                Quản lý thông tin tài khoản của bạn
            </small>

            <div class="row mt-4 g-4">

                <!-- LEFT -->
                <div class="col-md-4">
                    <div class="profile-card text-center">

                        <div class="avatar">MQ</div>

                        <h4 class="mt-3">Lê Thị Mỹ Quỳnh</h4>
                       <p class="text-white">DH52201348</p>
                        <small>D22_TH08</small>

                        <button id="btnEdit" class="btn btn-danger mt-3 w-100">
                            ✏️ Chỉnh sửa thông tin
                        </button>

                    </div>
                </div>

                <!-- RIGHT -->
                <div class="col-md-8">
                    <div class="info-card">

                        <h5 class="mb-4">Thông tin chi tiết</h5>

                        <form id="formHoSo">

                            <!-- KHÔNG SỬA -->
                            <div class="mb-3">
                                <label>Họ và tên</label>
                                <input type="text" class="form-control readonly"
                                    value="Lê Thị Mỹ Quỳnh"
                                    title="Mặc định, vui lòng liên hệ phòng đào tạo" readonly>
                            </div>

                            <div class="mb-3">
                                <label>Mã sinh viên</label>
                                <input type="text" class="form-control readonly"
                                    value="DH52201348"
                                    title="Mặc định, vui lòng liên hệ phòng đào tạo" readonly>
                            </div>

                            <div class="mb-3">
                                <label>Lớp</label>
                                <input type="text" class="form-control readonly"
                                    value="D22_TH08"
                                    title="Mặc định, vui lòng liên hệ phòng đào tạo" readonly>
                            </div>

                            <!-- CHO SỬA -->
                            <div class="mb-3">
                                <label>Số điện thoại</label>
                                <input type="text" id="phone" class="form-control editable" disabled>
                            </div>

                            <div class="mb-3">
                                <label>Địa chỉ</label>
                                <textarea id="address" class="form-control editable" disabled></textarea>
                            </div>

                            <button id="btnSave" type="submit" class="btn btn-success d-none">
                                💾 Lưu
                            </button>

                        </form>

                    </div>
                </div>

            </div>

        </div>

    </div>

</div>

<script src="../../public/js/ho-so.js"></script>

</body>
</html>
