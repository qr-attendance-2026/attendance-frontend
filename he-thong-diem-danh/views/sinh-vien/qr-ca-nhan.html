<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Cá Nhân</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- 🔥 FIX SIDEBAR -->
    <link rel="stylesheet" href="../../public/css/trang-chu.css">

    <link rel="stylesheet" href="../../public/css/qr-ca-nhan.css">
</head>

<body class="bg-main">
<div class="d-flex">
    <div id="sidebar-container"></div> <div class="content w-100 text-white">
        <div class="container-fluid p-4 text-center">
            <div class="alert alert-warning mb-4 shadow-sm mx-auto" style="max-width: 450px;">
                ⚠️ Mã QR này là duy nhất. Không chia sẻ để tránh bị điểm danh hộ.
            </div>

            <div id="capture-area" class="qr-card mx-auto shadow-lg bg-white text-dark">
                <div class="qr-header-title">THẺ SINH VIÊN ĐIỆN TỬ</div>
                <div class="qr-divider"></div>
                
                <div id="qrcode" class="d-flex justify-content-center my-3"></div>

                <div class="student-details pb-3">
                    <h4 id="tenSV" class="fw-bold text-uppercase mb-1"></h4>
                    <p id="mssv" class="text-danger fw-bold mb-1" style="font-size: 1.2rem;"></p>
                    <span id="lop" class="badge bg-secondary px-3 py-2"></span>
                </div>
            </div>

            <div class="mt-4 d-flex justify-content-center gap-3">
                <button class="btn btn-primary px-4 shadow" onclick="downloadFullCard()">⬇ Tải xuống thẻ</button>
                <button class="btn btn-success px-4 shadow" onclick="zoomQR()">🔍 Phóng to</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../public/js/qr-ca-nhan.js"></script>


<!-- MODAL PHÓNG TO -->
<div class="modal fade" id="zoomModal">
    <div class="modal-dialog modal-fullscreen">
        <div class="modal-content bg-dark d-flex justify-content-center align-items-center">

            <div id="zoomContent"></div>

            <!-- nút đóng -->
            <button class="btn btn-light position-absolute top-0 end-0 m-4"
                    data-bs-dismiss="modal">
                ✖
            </button>

        </div>
    </div>
</div>
</body>
</html>
