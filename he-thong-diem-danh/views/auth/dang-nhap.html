<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="../../public/css/dang-nhap.css">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body class="bg-login d-flex align-items-center justify-content-center">

<div class="container text-center">

    <div class="logo mb-3">
        <span>QR</span>
    </div>

    <h2 class="title">QR Attendance System</h2>
    <p class="subtitle">Hệ thống điểm danh sinh viên</p>

    <div class="card login-card mx-auto">
        <div class="card-body">

            <form id="formDangNhap">

                <!-- MSSV -->
                <div class="mb-3 text-start">
                    <label>MSSV</label>
                    <div class="input-group custom-input">
                        <span class="input-group-text">🎓</span>
                        <input 
                            type="text" 
                            id="mssv"
                            class="form-control" 
                            placeholder="VD: DH52201348"
                            required
                        >
                    </div>
                    <small id="errorMssv" class="text-danger d-none">
                        MSSV không được chứa ký tự đặc biệt!
                    </small>
                </div>

                <!-- Password -->
                <div class="mb-3 text-start">
                    <label>Mật khẩu</label>
                    <div class="input-group custom-input">
                        <span class="input-group-text">🔒</span>
                        <input 
                            type="password" 
                            id="password"
                            class="form-control" 
                            placeholder="••••••••"
                            required
                        >
                    </div>
                </div>

                <div class="d-flex justify-content-between small mb-3">
                    <a href="#" class="link-custom" id="quenMatKhau">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="btn btn-login w-100">Đăng nhập</button>

            </form>

        </div>
    </div>

    <p class="footer mt-4">© 2026 QR Attendance System</p>

</div>

<!-- Modal Quên mật khẩu -->
<div class="modal fade" id="modalQuenMK" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content modal-custom">

      <div class="modal-header border-0">
        <h5 class="modal-title">Hỗ trợ mật khẩu</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body text-center">
        <p>
            Vui lòng liên hệ <b>Phòng Đào Tạo</b><br>
            để được cấp lại mật khẩu.
        </p>
      </div>

      <div class="modal-footer border-0 justify-content-center">
        <button type="button" class="btn btn-login px-4" data-bs-dismiss="modal">
            Đã hiểu
        </button>
      </div>

    </div>
  </div>
</div>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- JS -->
<script src="../../public/js/dang-nhap.js"></script>

</body>
</html>
