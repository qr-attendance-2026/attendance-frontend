<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử giảng dạy | QR Attendance</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https://api-attendance-backend-520975280881.asia-southeast1.run.app https://cdn.jsdelivr.net https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; connect-src 'self' https://api-attendance-backend-520975280881.asia-southeast1.run.app;">

    <link rel="stylesheet" href="/attendance-frontend/teacher/css/style.css">
    <link rel="stylesheet" href="/attendance-frontend/teacher/css/history.css">
</head>

<body class="bg-light">
    <script src="/attendance-frontend/teacher/nav.js"></script>

    <div class="content">
        <div class="container-fluid">
            <div class="mb-4">
                <h1 class="page-title">Lịch sử giảng dạy</h1>
                <p class="page-subtitle">Xem lại các buổi dạy và điều chỉnh thông tin điểm danh</p>
            </div>

            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body p-4">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="stat-mini mb-2 d-block">Tìm kiếm môn học</label>
                            <input id="searchSubject" type="text" class="form-control" placeholder="Nhập tên môn...">
                        </div>
                        <div class="col-md-3">
                            <label class="stat-mini mb-2 d-block">Từ ngày</label>
                            <input id="fromDate" type="date" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label class="stat-mini mb-2 d-block">Đến ngày</label>
                            <input id="toDate" type="date" class="form-control">
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button class="btn btn-green w-100 py-2" onclick="filterData()">
                                <i class="bi bi-funnel me-1"></i> Lọc
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-lg-4">
                    <h6 class="fw-bold mb-3 text-secondary small text-uppercase">Các lớp đang phụ trách</h6>
                    <div id="history-list" class="d-grid gap-3">
                    </div>
                </div>

                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm">
                        <div
                            class="card-header bg-white py-3 d-flex justify-content-between align-items-center border-bottom">
                            <h6 class="fw-bold mb-0" id="detailTitle">Chi tiết điểm danh</h6>
                            <div class="d-flex gap-2">
                                <input type="text" id="searchStudent" class="form-control form-control-sm"
                                    placeholder="Tìm MSSV hoặc tên..." style="width: 200px;">
                                <button class="btn btn-sm btn-outline-green" onclick="exportToExcel()">
                                    <i class="bi bi-file-earmark-excel"></i> Xuất Excel
                                </button>
                            </div>
                        </div>

                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">MSSV</th>
                                        <th>Họ và tên</th>
                                        <th>Trạng thái</th>
                                        <th class="text-end pe-4">Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody id="attendanceTableBody">
                                    <tr>
                                        <td colspan="4" class="text-center py-5 text-muted">Vui lòng chọn buổi dạy để
                                            xem dữ liệu</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { teacherHistoryService } from './services/historyService.js';

        window.teacherHistoryService = teacherHistoryService;

        // 1. Khởi tạo danh sách lớp học
        async function initPage() {
            const listNode = document.getElementById('history-list');
            listNode.innerHTML = '<div class="text-center py-3"><div class="spinner-border spinner-border-sm text-success"></div></div>';

            try {
                const res = await teacherHistoryService.getClasses();
                const classes = res.data;

                if (!classes || classes.length === 0) {
                    listNode.innerHTML = '<div class="alert alert-info">Bạn chưa có lớp học nào.</div>';
                    return;
                }

                listNode.innerHTML = classes.map(c => `
    <div class="card border-0 shadow-sm list-item-card" onclick="fetchDetails(${c.id}, '${c.class_code}')">
        <div class="card-body p-3" style="cursor: pointer;">
            <div class="d-flex justify-content-between align-items-start mb-2">
<span class="badge bg-green-light text-green-dark">Nhóm: ${c.class_code || 'N/A'}</span>                <small class="text-muted">HK ${c.semester} - ${c.academic_year}</small>
            </div>
            <h6 class="fw-bold mb-1 text-dark">${c.subject?.subject_name || 'Môn học: ' + c.class_code}</h6>
            <div class="d-flex justify-content-between align-items-center mt-3">
                <span class="small text-secondary">
                    <i class="bi bi-people me-1"></i> ${c.students?.length || 0} SV
                </span>
                <button class="btn btn-sm btn-outline-green border-0">
                    Xem báo cáo <i class="bi bi-chevron-right ms-1"></i>
                </button>
            </div>
        </div>
    </div>
`).join('');

            } catch (err) {
                console.error("Lỗi:", err);
                listNode.innerHTML = '<div class="alert alert-danger">Không thể kết nối máy chủ.</div>';
            }
        }

        // 2. Lấy chi tiết báo cáo điểm danh của lớp
        window.fetchDetails = async (id, classCode) => {
            const tbody = document.getElementById('attendanceTableBody');

            // Đã thêm chữ "Nhóm môn học" vào đây
            document.getElementById('detailTitle').innerText = `Chi tiết điểm danh - Nhóm môn học: ${classCode}`;

            tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4"><div class="spinner-border text-success"></div></td></tr>';

            try {
                const res = await teacherHistoryService.getReport(id);
                // Laravel trả về data.students vì bạn dùng with(['students.user'])
                const students = res.data?.students || res.data || [];

                if (students.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4">Lớp này chưa có dữ liệu sinh viên.</td></tr>';
                    return;
                }

                tbody.innerHTML = students.map(s => {
                    // Lấy tên từ quan hệ user (giống trang điểm danh QR)
                    const studentName = s.user?.name || s.name || 'N/A';
                    const studentCode = s.student_code || 'N/A';

                    // Logic hiển thị trạng thái
                    const attendanceValues = Object.values(s.attendance || {});
                    const currentStatus = attendanceValues.length > 0 ? attendanceValues[0] : 'absent';
                    const isPresent = currentStatus === 'present';

                    return `
                <tr>
                    <td class="ps-4 fw-medium">${studentCode}</td>
                    <td>${studentName}</td>
                    <td>
                        <span class="badge ${isPresent ? 'bg-success' : 'bg-danger'}">
                            ${isPresent ? 'Có mặt' : 'Vắng mặt'}
                        </span>
                    </td>
                    <td class="text-end pe-4">
                        <select class="form-select form-select-sm d-inline-block w-auto" 
                            onchange="updateRecord(${s.id}, this.value)">
                            <option value="present" ${isPresent ? 'selected' : ''}>Có mặt</option>
                            <option value="absent" ${!isPresent ? 'selected' : ''}>Vắng</option>
                        </select>
                    </td>
                </tr>
            `;
                }).join('');
            } catch (err) {
                console.error(err);
                tbody.innerHTML = '<tr><td colspan="4" class="text-center text-danger">Lỗi tải dữ liệu chi tiết.</td></tr>';
            }
        };
        // 3. Cập nhật trạng thái
        window.updateRecord = async (studentId, status) => {
            try {

                await teacherHistoryService.updateStatus(studentId, status);
                alert("Cập nhật thành công!");
            } catch (err) {
                alert("Không thể cập nhật trạng thái!");
            }
        };

        // 4. Xuất Excel
        window.exportToExcel = () => {
            const tbody = document.getElementById('attendanceTableBody');
            const rows = tbody.querySelectorAll('tr');

            if (rows.length <= 1 && rows[0].innerText.includes("Vui lòng")) {
                alert("Không có dữ liệu để xuất!");
                return;
            }

            const data = [["MSSV", "Họ và tên", "Trạng thái"]];
            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                if (cells.length < 3) return;
                const mssv = cells[0].innerText;
                const name = cells[1].innerText;
                const status = cells[2].innerText;
                data.push([mssv, name, status]);
            });

            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "BaoCaoDiemDanh");
            XLSX.writeFile(wb, `DiemDanh_Lop.xlsx`);
        };

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>

</html>
