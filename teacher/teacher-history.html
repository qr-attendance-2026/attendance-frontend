<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử giảng dạy | QR Attendance</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <link rel="stylesheet" href="/attendance-frontend/teacher/style.css">
    <link rel="stylesheet" href="/attendance-frontend/teacher/history.css">
    
    <script src="/attendance-frontend/teacher/nav.js"></script>
</head>

<body class="bg-light">

<div class="content">
    <div class="container-fluid">
        <div class="mb-4">
            <h1 class="page-title">Lịch sử giảng dạy</h1>
            <p class="page-subtitle">Xem lại các buổi dạy và điều chỉnh thông tin điểm danh</p>
        </div>

        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body p-4">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="stat-mini mb-2 d-block">Tìm kiếm môn học</label>
                        <input id="searchSubject" type="text" class="form-control" placeholder="Nhập tên môn...">
                    </div>
                    <div class="col-md-3">
                        <label class="stat-mini mb-2 d-block">Từ ngày</label>
                        <input id="fromDate" type="date" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="stat-mini mb-2 d-block">Đến ngày</label>
                        <input id="toDate" type="date" class="form-control">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button class="btn btn-green w-100 py-2" onclick="filterData()">
                            <i class="bi bi-funnel me-1"></i> Lọc
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-4">
                <h6 class="fw-bold mb-3 text-secondary small text-uppercase">Các buổi dạy gần đây</h6>
                <div id="sessionList" class="d-grid gap-3">
                    </div>
            </div>

            <div class="col-lg-8">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center border-bottom">
                        <h6 class="fw-bold mb-0" id="detailTitle">Chi tiết điểm danh</h6>
                        <div class="d-flex gap-2">
                            <input type="text" id="searchStudent" class="form-control form-control-sm" 
                                   placeholder="Tìm MSSV hoặc tên..." onkeyup="filterStudentTable()" style="width: 200px;">
                            <button class="btn btn-sm btn-outline-green" onclick="exportToExcel()">
                                <i class="bi bi-file-earmark-excel"></i> Xuất Excel
                            </button>
                        </div>
                    </div>

                    <div id="quickView" class="bg-light border-bottom p-3 d-none">
                        <div class="row g-3 text-center">
                            <div class="col-4 border-end">
                                <div class="stat-mini">Sĩ số</div>
                                <div class="h5 fw-bold mb-0" id="statTotal">0</div>
                            </div>
                            <div class="col-4 border-end">
                                <div class="stat-mini text-green-dark">Có mặt</div>
                                <div class="h5 fw-bold text-green-dark mb-0" id="statPresent">0</div>
                            </div>
                            <div class="col-4">
                                <div class="stat-mini text-danger">Vắng mặt</div>
                                <div class="h5 fw-bold text-danger mb-0" id="statAbsent">0</div>
                            </div>
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0" id="mainAttendanceTable">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-4">MSSV</th>
                                    <th>Họ và tên</th>
                                    <th>Thời gian</th>
                                    <th>Trạng thái</th>
                                    <th class="text-end pe-4">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody id="attendanceTableBody">
                                <tr>
                                    <td colspan="5" class="text-center py-5 text-muted">Vui lòng chọn buổi dạy để xem dữ liệu</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div id="tableFooter" class="card-footer bg-light py-3 text-end d-none">
                        <button class="btn btn-green px-4 shadow-sm" onclick="saveChanges()">Lưu thay đổi</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Logic JavaScript giữ nguyên như cũ, chỉ cập nhật UI class nếu cần
    const mockSessions = [
        { id: "SESS01", name: "Kiến trúc phần mềm", class: "DH24-CNTT02", time: "15/03/2026", count: "42/45" },
        { id: "SESS02", name: "Lập trình Web nâng cao", class: "DH24-CNTT01", time: "14/03/2026", count: "45/45" }
    ];

    const mockStudents = {
        SESS01: [
            { mssv: "20110123", name: "Nguyễn Văn An", time: "07:05:12", status: 1 },
            { mssv: "20110456", name: "Trần Thị Bình", time: "--:--:--", status: 0 }
        ],
        SESS02: [
            { mssv: "20110999", name: "Lê Văn Cường", time: "13:02:44", status: 1 }
        ]
    };

    let currentStudentsData = [];

    function renderSessions(data) {
        const list = document.getElementById("sessionList");
        list.innerHTML = data.map(item => {
            const [present, total] = item.count.split('/').map(Number);
            const percentage = Math.round((present / total) * 100);
            const statusColor = percentage < 80 ? 'text-danger' : 'text-green-dark';

            return `
            <div class="card-session" onclick="loadAttendanceDetails('${item.id}','${item.name}')" id="card-${item.id}">
                <div class="session-info">
                    <div class="text-green-dark small mb-1 fw-bold">${item.time}</div>
                    <h6 class="mb-1 fw-bold">${item.name}</h6>
                    <p class="text-muted small mb-1">Lớp: ${item.class}</p>
                    <div class="progress" style="height: 4px; width: 100px;">
                        <div class="progress-bar bg-green" style="width: ${percentage}%"></div>
                    </div>
                </div>
                <div class="text-end">
                    <span class="badge rounded-pill badge-green-light border mb-1">${item.count}</span>
                    <small class="${statusColor} d-block fw-bold">${percentage}%</small>
                </div>
            </div>`;
        }).join("");
    }

    function loadAttendanceDetails(id, name) {
        document.querySelectorAll(".card-session").forEach(c => c.classList.remove("active"));
        document.getElementById(`card-${id}`).classList.add("active");
        document.getElementById("detailTitle").innerText = `Chi tiết: ${name}`;
        renderAttendanceTable(id);
    }

    function renderAttendanceTable(sessionId) {
        const students = mockStudents[sessionId] || [];
        currentStudentsData = JSON.parse(JSON.stringify(students)); 
        const tbody = document.getElementById("attendanceTableBody");
        const footer = document.getElementById("tableFooter");
        const quickView = document.getElementById("quickView");

        if (currentStudentsData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-center py-5 text-muted">Không có dữ liệu</td></tr>`;
            footer.classList.add("d-none");
            quickView.classList.add("d-none");
            return;
        }

        footer.classList.remove("d-none");
        quickView.classList.remove("d-none");

        tbody.innerHTML = currentStudentsData.map(st => `
            <tr>
                <td class="ps-4 fw-bold text-dark">${st.mssv}</td>
                <td class="fw-medium">${st.name}</td>
                <td class="text-muted small">${st.time}</td>
                <td>
                    <span id="badge-${st.mssv}" class="${st.status ? 'status-ok' : 'status-late'}">
                        ${st.status ? 'Có mặt' : 'Vắng'}
                    </span>
                </td>
                <td class="text-end pe-4">
                    <select class="form-select form-select-sm w-auto d-inline-block" onchange="updateStatusUI(this, '${st.mssv}')">
                        <option value="1" ${st.status ? 'selected' : ''}>Có mặt</option>
                        <option value="0" ${!st.status ? 'selected' : ''}>Vắng</option>
                    </select>
                </td>
            </tr>`).join("");
        updateQuickView();
    }

    function updateQuickView() {
        const total = currentStudentsData.length;
        const present = currentStudentsData.filter(s => s.status === 1).length;
        const absent = total - present;
        document.getElementById("statTotal").innerText = total;
        document.getElementById("statPresent").innerText = present;
        document.getElementById("statAbsent").innerText = absent;
    }

    function updateStatusUI(select, mssv) {
        const isPresent = select.value == "1";
        const badge = document.getElementById(`badge-${mssv}`);
        badge.className = isPresent ? "status-ok" : "status-late";
        badge.innerText = isPresent ? "Có mặt" : "Vắng";

        const student = currentStudentsData.find(s => s.mssv === mssv);
        if (student) {
            student.status = isPresent ? 1 : 0;
            if (isPresent && student.time === "--:--:--") {
                student.time = new Date().toLocaleTimeString('vi-VN', { hour12: false });
                select.closest('tr').querySelector('.text-muted').innerText = student.time;
            }
        }
        updateQuickView();
    }

    function filterData() {
        const searchText = document.getElementById("searchSubject").value.toLowerCase();
        const fromDate = document.getElementById("fromDate").value;
        const toDate = document.getElementById("toDate").value;

        const filtered = mockSessions.filter(s => {
            const parts = s.time.split('/');
            const sessionDate = `${parts[2]}-${parts[1]}-${parts[0]}`;
            const matchText = s.name.toLowerCase().includes(searchText);
            const matchFrom = fromDate ? sessionDate >= fromDate : true;
            const matchTo = toDate ? sessionDate <= toDate : true;
            return matchText && matchFrom && matchTo;
        });
        renderSessions(filtered);
    }

    function filterStudentTable() {
        const filter = document.getElementById("searchStudent").value.toLowerCase();
        const rows = document.querySelectorAll("#attendanceTableBody tr");
        rows.forEach(row => {
            const text = row.innerText.toLowerCase();
            row.style.display = text.includes(filter) ? "" : "none";
        });
    }

    function exportToExcel() {
        if (currentStudentsData.length === 0) {
            alert("Vui lòng chọn một buổi dạy!");
            return;
        }
        const dataForExcel = currentStudentsData.map(st => ({
            "MSSV": st.mssv,
            "Họ và Tên": st.name,
            "Giờ điểm danh": st.time,
            "Kết quả": st.status === 1 ? "Có mặt" : "Vắng mặt"
        }));
        const ws = XLSX.utils.json_to_sheet(dataForExcel);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "DiemDanh");
        const sessionTitle = document.getElementById("detailTitle").innerText.replace("Chi tiết: ", "");
        XLSX.writeFile(wb, `DiemDanh_${sessionTitle}_${new Date().toLocaleDateString('vi-VN')}.xlsx`);
    }

    function saveChanges() {
        console.log("Data to send:", currentStudentsData);
        alert("fetch o day)");
    }

    document.addEventListener("DOMContentLoaded", () => renderSessions(mockSessions));
</script>

</body>
</html>
