<!DOCTYPE html>
<html>

<head>

<title>Check-in</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

</head>

<body>

<script src="layout.js"></script>

<div class="content">

<h2 class="fw-bold">Check-in Management</h2>

<div class="row mt-4">

<!-- QR LEFT -->

<div class="col-md-6">

<div class="card shadow-sm p-4 text-center">

<h5 class="mb-3">QR Code Check-in</h5>

<canvas id="qrcode"></canvas>

<p class="text-muted mt-3">

QR chỉ có hiệu lực trong ngày

</p>

</div>

</div>

<!-- SET TIME -->

<div class="col-md-6">

<div class="card shadow-sm p-4">

<h5>Set Check-in Time</h5>

<label class="mt-3">Start Time</label>
<input id="startTime" type="time" class="form-control">

<label class="mt-3">End Time</label>
<input id="endTime" type="time" class="form-control">

<button class="btn btn-primary mt-3 w-100" onclick="generateQR()">

Set Time & Generate QR

</button>

<p class="text-danger mt-2 small">

Note: QR chỉ sử dụng trong ngày hôm nay

</p>

</div>

</div>

</div>

<!-- CHECKIN LIST -->

<div class="card shadow-sm mt-4 p-3">

<h5>Recent Check-ins</h5>

<table class="table table-hover">

<thead>

<tr>

<th>ID</th>
<th>Name</th>
<th>Time</th>
<th>Status</th>

</tr>

</thead>

<tbody id="checkinTable"></tbody>

</table>

</div>

</div>

<script>

let checkins = [
{id:1,name:"Nguyễn Văn A",time:"08:30"},
{id:2,name:"Trần Thị B",time:"09:10"}
]

function generateQR(){

let start = document.getElementById("startTime").value
let end = document.getElementById("endTime").value

let data = {

start:start,
end:end,
date:new Date().toDateString()

}

QRCode.toCanvas(
document.getElementById("qrcode"),
JSON.stringify(data)
)

renderCheckins()

}

function renderCheckins(){

let tbody = document.getElementById("checkinTable")

tbody.innerHTML=""

checkins.forEach(u=>{

let status = u.time <= "09:00"
? '<span class="status-ok">On Time</span>'
: '<span class="status-late">Late</span>'

tbody.innerHTML += `

<tr>

<td>#${u.id}</td>

<td>${u.name}</td>

<td>${u.time}</td>

<td>${status}</td>

</tr>

`

})

}

renderCheckins()

</script>

</body>

</html>
