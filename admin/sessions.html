<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h3>Admin</h3>
        <a href="index.html">Dashboard</a>
        <a href="students.html">Sinh viên</a>
        <a href="lecturers.html">Giảng viên</a>
        <a href="academic.html">Học thuật</a>
        <a href="sessions.html" class="active">QR</a>
        <a href="attendance.html">Điểm danh</a>
        <a href="profile.html">Tài khoản</a>
    </div>

    <!-- MAIN -->
    <div class="main">

        <h2>Buổi học & QR</h2>

        <button class="btn btn-primary" id="btnCreate">
            + Tạo buổi học
        </button>

        <!-- LIST SESSION -->
        <div id="sessionList" style="margin-top:20px;"></div>

    </div>

    <!-- MODAL -->
    <div id="modalSession">
        <div class="modal-box">
            <h3>Tạo buổi học</h3>

            <input id="sessionName" placeholder="Tên buổi học">
            <input id="sessionRoom" placeholder="Phòng">
            <input id="startTime" type="datetime-local" placeholder="Bắt đầu">
            <input id="endTime" type="datetime-local" placeholder="Kết thúc">

            <div style="display:flex;justify-content:space-between;">
                <button class="btn btn-success" onclick="saveSession()">Tạo</button>
                <button class="btn btn-danger" onclick="closeSession()">Hủy</button>
            </div>
        </div>
    </div>

    <script src="assets/js/sessions.js"></script>

</body>

</html>
