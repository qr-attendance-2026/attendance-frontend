<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h3>Admin</h3>
        <a href="index.html">Dashboard</a>
        <a href="students.html">Sinh viên</a>
        <a href="lecturers.html">Giảng viên</a>
        <a href="academic.html">Học thuật</a>
        <a href="sessions.html">QR</a>
        <a href="attendance.html" class="active">Điểm danh</a>
        <a href="profile.html">Tài khoản</a>
    </div>

    <!-- MAIN -->
    <div class="main">

        <h2>Quản lý Điểm danh</h2>

        <!-- ===== STATS ===== -->
        <div class="stats">
            <div class="stat-card">
                <h4>Tổng số</h4>
                <h2 id="total">0</h2>
            </div>

            <div class="stat-card">
                <h4>Đã quét</h4>
                <h2 id="checked">0</h2>
            </div>

            <div class="stat-card">
                <h4>Vắng</h4>
                <h2 id="absent">0</h2>
            </div>
        </div>

        <!-- ===== MAIN CONTENT ===== -->
        <div class="attendance-layout">

            <!-- QR ZONE -->
            <div class="qr-zone">
                <h3>Quét QR</h3>

                <div class="qr-box">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=ATTENDANCE" alt="QR Code">
                </div>

                <p>Đưa điện thoại vào để quét</p>
            </div>

            <!-- HISTORY -->
            <div class="history">
                <h3>Lịch sử quét</h3>

                <table class="table">
                    <thead>
                        <tr>
                            <th>Tên</th>
                            <th>Thời gian</th>
                            <th>Trạng thái</th>
                        </tr>
                    </thead>
                    <tbody id="historyTable"></tbody>
                </table>

            </div>

        </div>

    </div>

    <script src="assets/js/attendance.js"></script>

</body>

</html>
