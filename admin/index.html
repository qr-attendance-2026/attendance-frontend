<!DOCTYPE html>
<html>

<head>
    <title>Trang chủ Admin</title>

    <!-- BOOTSTRAP (đặt TRƯỚC) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS CỦA BẠN -->
    <link rel="stylesheet" href="assets/css/style.css">

    <!-- CHART -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <!-- SIDEBAR (GIỮ NGUYÊN) -->
    <div class="sidebar">
        <h3>Admin</h3>
        <a href="index.html" class="active">Dashboard</a>
        <a href="students.html">Sinh viên</a>
        <a href="lecturers.html">Giảng viên</a>
        <a href="academic.html">Học thuật</a>
    </div>

    <!-- MAIN -->
    <div class="main">

        <h2>Dashboard</h2>

        <!-- MIX BOOTSTRAP + CSS CŨ -->
        <div class="dashboard">
            <div class="card">
                <h4>Sinh viên</h4>
                <h2>1200</h2>
            </div>

            <div class="card">
                <h4>Lớp học</h4>
                <h2>30</h2>
            </div>

            <div class="card">
                <h4>Tỷ lệ</h4>
                <h2>92%</h2>
            </div>
        </div>

        <!-- CHART -->
        <div class="card chart-card mt-3">
            <canvas id="chart"></canvas>
        </div>

    </div>

    <!-- JS GIỮ NGUYÊN -->
    <script src="assets/js/layout.js"></script>
    <script>
        loadLayout();
    </script>

    <script>
        new Chart(document.getElementById('chart'), {
            type: 'line',
            data: {
                labels: ['T2', 'T3', 'T4', 'T5', 'T6'],
                datasets: [{
                    label: 'Attendance',
                    data: [10, 20, 15, 30, 25],
                    borderColor: '#22c55e',
                    tension: 0.4
                }]
            }
        });
    </script>

</body>

</html>
