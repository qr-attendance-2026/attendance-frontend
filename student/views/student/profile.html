<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hồ sơ cá nhân - STU</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../public/css/home.css">
    <link rel="stylesheet" href="../../public/css/profile.css">
</head>
<body class="bg-main">
<div class="d-flex">
    <div id="sidebar-container"></div>

    <div class="content w-100 text-white">
        <div class="container-fluid p-4">
            <h3 class="fw-bold">Hồ sơ cá nhân</h3>
            <small class="text-light opacity-75">Quản lý thông tin tài khoản của bạn</small>

            <div class="row mt-4 g-4">
                <div class="col-md-4">
                    <div class="profile-card text-center p-4">
                        <div class="avatar mx-auto" id="avatarCircle">STU</div>
                        <h4 class="mt-3" id="displayFullName">Họ tên</h4>
                        <p class="text-white-50" id="displayStudentCode">MSSV</p>
                        <span class="badge bg-danger" id="displayCohortClass">Lớp</span>
                        <button id="btnEdit" class="btn btn-outline-light mt-4 w-100">✏️ Chỉnh sửa thông tin</button>
                    </div>
                </div>

                <div class="col-md-8">
                    <div class="info-card p-4">
                        <h5 class="mb-4 text-info">Thông tin chi tiết</h5>
                        <form id="formHoSo">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small text-white-50">Họ và tên</label>
                                    <input type="text" id="inputName" class="form-control readonly" readonly>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small text-white-50">Mã sinh viên</label>
                                    <input type="text" id="inputCode" class="form-control readonly" readonly>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small text-white-50">Lớp quản lý</label>
                                    <input type="text" id="inputClass" class="form-control readonly" readonly>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small text-white-50">Ngày sinh</label>
                                    <input type="date" id="inputDob" class="form-control readonly" readonly>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small text-white-50">Số điện thoại</label>
                                    <input type="text" id="inputPhone" class="form-control editable" disabled>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small text-white-50">Email</label>
                                    <input type="email" id="inputEmail" class="form-control readonly" readonly>
                                </div>
                            </div>
                            <button id="btnSave" type="submit" class="btn btn-success d-none mt-3">💾 Lưu thay đổi</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="../../public/js/profile.js"></script>
</body>
</html>
