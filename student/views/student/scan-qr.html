<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quét QR</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../public/css/home.css">
    <link rel="stylesheet" href="../../public/css/scan-qr.css">
</head>

<body class="bg-main">

<div class="d-flex">

    <!-- SIDEBAR -->
    <div id="sidebar-container"></div>

    <!-- CONTENT -->
    <div class="content w-100 text-white">

        <div class="container-fluid p-4">

            <h3 class="fw-bold">Quét mã QR điểm danh</h3>
            <small class="text-light opacity-75">
                Đưa mã QR vào khung để điểm danh
            </small>

            <div class="scanner-wrapper">
                

                <div class="scanner-box">

                    <!-- CAMERA -->
                    <div id="reader"></div>

                    <!-- PLACEHOLDER -->
                    <div id="camera-off">
                        <div class="icon">📷</div>
                        <p>Camera chưa được bật</p>
                    </div>

                    <!-- EFFECT (ẩn ban đầu) -->
                    <div id="scanEffect" class="d-none">
                        <div class="corner tl"></div>
                        <div class="corner tr"></div>
                        <div class="corner bl"></div>
                        <div class="corner br"></div>
                        <div class="scan-line"></div>
                    </div>

                </div>

            </div>

            <!-- BUTTON -->
            <div class="text-center mt-4">
                <button id="btnCamera" class="btn btn-danger px-4"
                        onclick="toggleCamera()">
                    🎥 Bật camera
                </button>
            </div>

            <!-- STATUS -->
            <div class="text-center mt-3">
                <div id="statusBox" class="alert alert-warning d-inline-block">
                    Chưa quét QR
                </div>
            </div>

        </div>

    </div>

</div>

<!-- MODAL -->
<div class="modal fade" id="successModal">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-center p-4">
            <h4 class="text-success">✅ Điểm danh thành công</h4>
            <p id="qrContent"></p>
            <button class="btn btn-success mt-3" data-bs-dismiss="modal">OK</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="../../public/js/scan-qr.js"></script>

</body>
</html>
