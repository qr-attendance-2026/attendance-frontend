<!DOCTYPE html>
<html>

<head>

<title>Users</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<script src="layout.js"></script>

<div class="content">

<h2 class="fw-bold">Users Management</h2>

<div class="card shadow-sm p-3">

<div class="d-flex justify-content-between mb-3">

<input id="search" class="form-control w-25" placeholder="Search users" onkeyup="searchUser()">

<button class="btn btn-primary" onclick="addUser()">Add User</button>

</div>

<table class="table table-hover">

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Action</th>
</tr>
</thead>

<tbody id="userTable"></tbody>

</table>


<nav class="mt-4">

<ul class="pagination justify-content-center align-items-center gap-1">

<li class="page-item">
<a class="page-link" onclick="firstPage()">First</a>
</li>

<li class="page-item">
<a class="page-link" onclick="prevPage()">Previous</a>
</li>

<span id="pagination" class="d-flex"></span>

<li class="page-item">
<a class="page-link" onclick="nextPage()">Next</a>
</li>

<li class="page-item">
<a class="page-link" onclick="lastPage()">Last</a>
</li>

</ul>


</nav>

</div>

</div>

<script src="users.js"></script>

</body>
</html>
