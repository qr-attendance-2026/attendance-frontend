<!DOCTYPE html>
<html>

<head>
    <title>Quản lý Sinh Viên</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body>

    <div class="sidebar">
        <h3>Admin</h3>
        <a href="../admin/index.html">Dashboard</a>
        <a href="../admin/students.html" class="active">Sinh viên</a>
        <a href="../admin/lecturers.html">Giảng viên</a>
        <a href="../admin/academic.html">Học thuật</a>

        <a href="../login/login.html" id="logoutBtn" class="logout-btn">🚪 Đăng xuất</a>
    </div>

    <div class="main">

        <div class="header">
            <h2>Quản lý Sinh viên</h2>
            <div>Xin chào, Admin 👋</div>
        </div>

        <div class="top-actions">
            <button class="btn btn-success" id="btnAdd">+ Thêm sinh viên</button>
            <button class="btn btn-import" id="btnImport">📥 Import Excel</button>
        </div>

        <input type="file" id="excelFile" hidden>

        <input id="search" placeholder="🔍 Tìm kiếm..." class="form-control mb-3">

        <table class="table" >
            <thead>
                <tr>
                    <th>Mã SV</th>
                    <th>Tên</th>
                    <th>Lớp</th>
                    <th>Email</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="studentTable"></tbody>
        </table>

    </div>

    <div id="modal" class="modal">
        <div class="modal-box">
            <h3 id="modalTitle">Thêm sinh viên</h3>

            <input id="mssv" placeholder="MSSV">
            <input id="name" placeholder="Tên">
            <input id="class" placeholder="Lớp">
            <input id="email" placeholder="Email">

            <div class="modal-actions">
                <button class="btn btn-success" onclick="saveStudent()">Lưu</button>
                <button class="btn btn-danger" onclick="closeModal()">Hủy</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="assets/js/students.js"></script>

</body>
<div id="importModal" class="modal">
    <div class="modal-box">

        <h3>📥 Import Excel</h3>

        <div class="upload-box" id="uploadBox">
            <p>Kéo thả file hoặc click để chọn</p>
            <input type="file" id="excelFile" hidden>
        </div>

        <div class="modal-actions">
            <button class="btn btn-danger" onclick="closeImport()">Đóng</button>
        </div>

    </div>
</div>
</html>
