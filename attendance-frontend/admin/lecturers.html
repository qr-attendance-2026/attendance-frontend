<!DOCTYPE html>
<html>
<head>
    <title>Giảng viên</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<div class="sidebar">
    <h3>Admin</h3>
    <a href="../admin/index.html">Dashboard</a>
    <a href="../admin/students.html">Sinh viên</a>
    <a href="../admin/lecturers.html" class="active">Giảng viên</a>
    <a href="../admin/subjects.html">Môn học</a>
    <a href="../admin/courseclasses.html">Lớp học phần</a>

    <a href="../login/login.html" id="logoutBtn" class="logout-btn">🚪 Đăng xuất</a>
</div>

<div class="main">

    <div class="header">
        <h2>Quản lý Giảng viên</h2>
        <div>Xin chào, Admin 👋</div>
    </div>

    <input id="search" class="form-control mb-3" placeholder="🔍 Tìm kiếm...">
    <div class="top-actions">
        <button class="btn btn-import" id="btnImport">📥 Import Excel</button>
        <a href="assets/documents/teacher_import_template.xlsx" download class="btn btn-secondary" style="margin-left: 10px;">📄 Tải file mẫu</a>
    </div>

    <table class="table" id="lecturerTable">
        <thead>
            <tr>
                <th>Mã Giảng viên</th>
                <th>Họ và tên</th>
                <th>Email</th>
                <th>Khoa</th>
                <th></th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

</div>

<div id="modal" class="modal">
    <div class="modal-box">
        <h3 id="modalTitle"></h3>
        <input id="magv" placeholder="Mã">
        <input id="name" placeholder="Tên">
        <input id="email" placeholder="Email">
        <input id="khoa" placeholder="Khoa">

        <div class="modal-actions">
            <button class="btn btn-success" onclick="saveLecturer()">Lưu</button>
            <button class="btn btn-danger" onclick="closeModal()">Hủy</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script src="assets/js/lecturers.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</body>
<div id="importModal" class="modal">
    <div class="modal-box">

        <h3>📥 Import Excel</h3>

        <div class="upload-box" id="uploadBox">
            <p>Kéo thả file hoặc click để chọn</p>
            <input type="file" id="excelFile" hidden>
        </div>

        <div class="modal-actions">
            <button class="btn btn-danger" onclick="closeImport()">Đóng</button>
        </div>

    </div>
</div>
</html>
