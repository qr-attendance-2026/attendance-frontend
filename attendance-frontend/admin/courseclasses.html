<!DOCTYPE html>
<html>
<head>
    <title>Lớp học phần</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<div class="sidebar">
    <h3>Admin</h3>
    <a href="../admin/index.html">Dashboard</a>
    <a href="../admin/students.html">Sinh viên</a>
    <a href="../admin/lecturers.html">Giảng viên</a>
    <a href="../admin/subjects.html">Môn học</a>
    <a href="../admin/courseclasses.html"  class="active">Lớp học phần</a>

    <a href="../login/login.html" id="logoutBtn" class="logout-btn">🚪 Đăng xuất</a>
</div>

<div class="main">

    <div class="header">
        <h2>Quản lý Học Phần</h2>
        <div>Xin chào, Admin 👋</div>
    </div>

    <input id="searchAcademic" class="form-control mb-3" placeholder="🔍 Tìm kiếm...">
    <div class="top-actions">
        <button class="btn btn-import" id="btnImport">📥 Import Excel</button>
        <a href="assets/documents/schedule_import_template.xlsx" download class="btn btn-secondary" style="margin-left: 10px;">📄 Tải file mẫu</a>
    </div>

    <table class="table" id="academicTable">
        <thead>
            <tr>
                <th>Học kỳ</th>
                <th>Năm học</th>
                <th>Tên môn học</th>
                <th>Nhóm môn học</th>
                <th>Giảng viên</th>
                <th>Thứ</th>
                <th>Tiết</th>
                <th>Phòng</th>
                <th>Ngày bắt đầu</th>
                <th>Ngày kết thúc</th>
                <th></th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

</div>

<div id="modalAcademic">
    <div class="modal-box">
        <h3 id="modalTitleAcademic"></h3>

        <input id="faculty" placeholder="Khoa">
        <input id="major" placeholder="Ngành">
        <input id="classAcademic" placeholder="Lớp">
        <input id="subject" placeholder="Môn">

        <div class="modal-actions">
            <button class="btn btn-success" onclick="saveAcademic()">Lưu</button>
            <button class="btn btn-danger" onclick="closeAcademic()">Hủy</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script src="assets/js/courseclasses.js"></script>

</body>
<div id="importModal" class="modal">
    <div class="modal-box">

        <h3>📥 Import Excel</h3>

        <div class="upload-box" id="uploadBox">
            <p>Kéo thả file hoặc click để chọn</p>
            <input type="file" id="excelFile" hidden>
        </div>

        <div class="modal-actions">
            <button class="btn btn-danger" onclick="closeImport()">Đóng</button>
        </div>

    </div>
</div>
</html>
