<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">

    <!-- CHART -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h3>Admin</h3>
        <a href="../admin/index.html" class="active">Dashboard</a>
        <a href="../admin/students.html">Sinh viên</a>
        <a href="../admin/lecturers.html">Giảng viên</a>
        <a href="../admin/subjects.html">Môn học</a>
        <a href="../admin/courseclasses.html">Lớp học phần</a>

        <a href="../login/login.html" id="logoutBtn" class="logout-btn">🚪 Đăng xuất</a>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- HEADER -->
        <div class="header">
            <h2>Dashboard</h2>
            <div>Xin chào, Admin 👋</div>
        </div>

        <!-- CARD -->
        <div class="dashboard">
            <div class="card gradient-card">
                <h4>👨‍🎓 Sinh viên</h4>
                <h2 id="totalStudents">0</h2>
            </div>

            <div class="card gradient-card">
                <h4>🏫 Lớp</h4>
                <h2 id="totalClasses">0</h2>
            </div>

            <div class="card gradient-card">
                <h4>📈 Tỷ lệ</h4>
                <h2 id="attendanceRate">0%</h2>
            </div>
        </div>

        <!-- CHART -->
        <div class="card mt-3">
            <div style="display:flex;justify-content:space-between;margin-bottom:10px">
                <h5>📊 Thống kê điểm danh</h5>
                <span style="color:#94a3b8">Tuần này</span>
            </div>

            <canvas id="chart"></canvas>
        </div>

    </div>

    <!-- TOAST -->
    <div id="toast" class="toast"></div>

    <!-- SCRIPT -->
    <script src="assets/js/chart.js"></script>

</body>

</html>
