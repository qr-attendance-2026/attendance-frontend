<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Điểm danh - Teacher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/attendance-frontend/teacher/css/style.css">
    <link rel="stylesheet" href="/attendance-frontend/teacher/css/checkin.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <script src="/attendance-frontend/teacher/nav.js"></script>
</head>

<body class="bg-light">
    <div class="main-content">
        <div class="container-fluid px-4 pt-3">
            <h5 class="fw-bold mb-3">Điểm danh</h5>

            <div class="card border-0 shadow-sm p-4 mb-4">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label small fw-bold text-muted">Chọn đợt</label>
                        <select id="filterSemester" class="form-select border-0 bg-light shadow-sm"
                            onchange="filterClasses()">
                            <option value="2026-2027|2">Học kỳ 2 năm học 2026-2027</option>
                            <option value="2026-2027|1">Học kỳ 1 năm học 2026-2027</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-bold text-muted">Ngày điểm danh</label>
                        <input type="date" id="attendanceDate" class="form-control border-0 bg-light shadow-sm">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-bold text-muted">Chọn lớp học phần</label>
                        <select id="course_class_id" class="form-select border-0 bg-light shadow-sm"
                            onchange="loadStudents()">
                            <option value="">-- Đang tải danh sách lớp --</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small fw-bold text-danger">Thời gian QR (Phút)</label>
                        <input type="number" id="duration_minutes"
                            class="form-control border-0 bg-light shadow-sm text-danger fw-bold" value="15" min="1"
                            max="120">
                    </div>
                </div>
            </div>

            <div class="d-flex gap-2 mb-4 align-items-center">
                <button class="btn btn-success px-4 py-2 shadow-sm"><i class="bi bi-save me-2"></i>Lưu điểm
                    danh</button>
                <button class="btn btn-danger px-4 py-2 shadow-sm" onclick="generateQR(1)">
                    <i class="bi bi-qr-code me-2"></i>QR điểm danh
                </button>
                <button class="btn btn-secondary px-4 py-2 shadow-sm"><i class="bi bi-upc-scan me-2"></i>Quét
                    mã</button>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light small">
                            <tr>
                                <th class="ps-4" width="40"><input type="checkbox" class="form-check-input"></th>
                                <th width="60">STT</th>
                                <th>MSSV</th>
                                <th>Họ tên</th>
                                <th>Trạng thái</th>
                                <th class="pe-4">Lớp học</th>
                            </tr>
                        </thead>
                        <tbody id="attendanceBody">
                            <tr>
                                <td colspan="7" class="text-center py-4 text-muted">Vui lòng chọn lớp để xem danh sách
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="qrOverlay">
        <div class="qr-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="qr-status-badge">
                    <i class="bi bi-broadcast-pin me-1"></i> Đang phát mã QR
                </div>
                <button type="button" class="btn-close" onclick="closeQR()"></button>
            </div>

            <h5 class="fw-bold mb-1">Mã QR Điểm danh</h5>
            <p class="text-muted small mb-4">Vui lòng quét mã để xác nhận hiện diện</p>

            <div class="qrcode-wrapper mb-4">
                <canvas id="qrcode"></canvas>
            </div>

            <div class="row g-2">
                <div class="col-6">
                    <div class="p-2 border rounded-3 bg-light">
                        <div class="small text-muted">Lần điểm</div>
                        <div class="fw-bold h5 mb-0" id="currentCheckNum">1</div>
                    </div>
                </div>
                <div class="col-6">
                    <div class="p-2 border rounded-3 bg-light">
                        <div class="small text-muted">Thời gian còn</div>
                        <div class="fw-bold h5 mb-0"><span id="displayDuration">15</span>'</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import teacherApi from './services/teacherApi.js';

        let allClasses = [];
        const el = (id) => document.getElementById(id);

        document.addEventListener('DOMContentLoaded', async () => {
            const dateInput = el("attendanceDate");
            if (dateInput) dateInput.value = new Date().toISOString().split('T')[0];
            await initData();
        });

        async function initData() {
            try {
                const response = await teacherApi.getClasses();
                if (response.success) {
                    allClasses = response.data;
                    window.filterClasses();
                }
            } catch (err) { console.error("Lỗi:", err); }
        }

        window.filterClasses = () => {
            const semesterVal = el("filterSemester").value;
            const [year, sem] = semesterVal.split('|');
            const filtered = allClasses.filter(c => c.academic_year == year && c.semester == sem);

            const select = el("course_class_id");
            if (filtered.length > 0) {
                select.innerHTML = filtered.map(c => `
                <option value="${c.id}">${c.class_code} - ${c.subject?.subject_name || 'Môn học'}</option>
            `).join('');
                window.loadStudents();
            } else {
                select.innerHTML = '<option value="">Không có lớp học</option>';
                el("attendanceBody").innerHTML = '<tr><td colspan="7" class="text-center py-4">Dữ liệu trống</td></tr>';
            }
        };

        window.loadStudents = () => {
            const classId = el("course_class_id").value;
            const selectedClass = allClasses.find(c => c.id == classId);
            if (selectedClass && selectedClass.students) {
                el("attendanceBody").innerHTML = selectedClass.students.map((s, i) => `
            <tr>
                <td class="ps-4"><input type="checkbox" class="form-check-input"></td>
                <td>${i + 1}</td>
                <td><span class="fw-bold text-dark">${s.student_code}</span></td>
                <td>${s.user?.name || 'N/A'}</td>
                <td>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" 
                            ${s.pivot?.check_1 ? 'checked' : ''} 
                            id="check_${s.id}">
                        <label class="form-check-label small" for="check_${s.id}">
                            ${s.pivot?.check_1 ? '<span class="text-success">Đã có mặt</span>' : '<span class="text-danger">Vắng</span>'}
                        </label>
                    </div>
                </td>
                <td class="text-muted pe-4">${selectedClass.class_code}</td>
            </tr>
        `).join('');
            }
        };

        let countdownInterval;

        window.generateQR = async (checkNumber) => {
            const classId = el("course_class_id").value;
            const duration = el("duration_minutes").value;
            if (!classId) return alert("Vui lòng chọn lớp!");

            try {
                const res = await teacherApi.createSession({
                    course_class_id: parseInt(classId),
                    check_number: checkNumber,
                    duration_minutes: parseInt(duration)
                });

                if (res.success) {
                    el("qrOverlay").style.display = "flex";
                    el("currentCheckNum").innerText = checkNumber;

                    let timeRemaining = parseInt(duration) * 60;
                    el("displayDuration").innerText = duration;

                    if (countdownInterval) clearInterval(countdownInterval);

                    countdownInterval = setInterval(() => {
                        timeRemaining--;

                        if (timeRemaining <= 0) {
                            clearInterval(countdownInterval);
                            el("displayDuration").innerText = "0";
                            alert("Hết thời gian điểm danh!");
                            window.closeQR();
                        } else {
                            el("displayDuration").innerText = Math.ceil(timeRemaining / 60);
                        }
                    }, 1000);

                    QRCode.toCanvas(el("qrcode"), res.data.qr_payload, {
                        width: 450,
                        margin: 2,
                        color: { light: "#ffffff" },
                        errorCorrectionLevel: 'H'
                    });
                }
            } catch (err) { alert("Lỗi tạo phiên điểm danh!"); }
        };

        window.closeQR = () => {
            el("qrOverlay").style.display = "none";
            if (countdownInterval) clearInterval(countdownInterval);
        };
    </script>
</body>

</html>
