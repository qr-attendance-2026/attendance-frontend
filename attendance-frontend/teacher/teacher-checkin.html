<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Attendance - Check-in Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="/attendance-frontend/teacher/style.css">
    <link rel="stylesheet" href="/attendance-frontend/teacher/checkin.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <script src="/attendance-frontend/teacher/nav.js"></script>

</head>
<body>

    <div class="main-content">
        <div class="container-fluid px-4">
            <div class="row mb-4 align-items-end">
                <div class="col-md-7">
                    <h3 class="fw-bold mb-1">Quản lý Điểm danh</h3>
                    <p class="text-muted m-0">
                        <span class="me-3"><i class="bi bi-journal-code me-1 text-custom"></i> Lập trình Web nâng cao</span>
                        <span><i class="bi bi-people me-1 text-custom"></i> Lớp: DH24-CNTT01</span>
                    </p>
                </div>
                <!-- <div class="col-md-5 d-flex justify-content-md-end align-items-center mt-3">
                    <div class="stats-wrapper">
                        <div class="stat-item">
                            <div class="stat-label-simple text-muted">Sĩ số</div>
                            <div class="stat-value-simple">45</div>
                        </div>
                        <div class="stat-item stat-divider">
                            <div class="stat-label-simple text-custom">Hiện diện</div>
                            <div class="stat-value-simple text-present" id="presentCount">02</div>
                        </div>
                    </div>
                </div> -->
            </div>

            <div class="row g-4">
                <div class="col-xl-4 col-lg-5">
                    <div class="card p-4 h-100 shadow-sm border-0">
                        <div class="d-flex align-items-center mb-4 text-custom">
                            <i class="bi bi-sliders2-vertical me-2"></i>
                            <h6 class="fw-bold m-0">Cấu hình thời gian</h6>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Giờ bắt đầu</label>
                            <input id="startTime" type="time" class="form-control bg-light" value="07:30">
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold small">Giờ kết thúc</label>
                            <input id="endTime" type="time" class="form-control bg-light" value="09:30">
                        </div>
                        
                        <button class="btn btn-primary-custom btn-lg w-100 py-3 mb-2 shadow-sm" onclick="generateQR()">
                            <i class="bi bi-qr-code-scan me-2"></i>Cập nhật mã QR
                        </button>
<!--                         
                        <button class="btn btn-outline-danger w-100 py-2 mb-3" onclick="stopAttendance()">
                            <i class="bi bi-stop-circle me-2"></i>Dừng điểm danh
                        </button> -->

                        <div class="p-3 bg-light rounded-3 small text-muted mt-auto border-start border-4 border-success">
                            <i class="bi bi-info-circle-fill me-1 text-custom"></i> 
                            Sau <b id="displayEndTime" class="text-dark">09:30</b>, SV sẽ bị tính là muộn/vắng.
                        </div>
                    </div>
                </div>

                <div class="col-xl-8 col-lg-7 text-center">
                    <div class="card p-4 h-100 d-flex flex-column align-items-center justify-content-center shadow-sm border-0">
                        <div class="mb-3 w-100 d-flex justify-content-between">
                            <span class="text-muted small fw-bold uppercase-tracking">Mã QR Lớp học</span>
                            <span id="statusBadge" class="badge bg-success-subtle text-custom rounded-pill px-3">Đang hiệu lực</span>
                        </div>
                        
                        <div class="qr-container bg-light d-flex align-items-center justify-content-center">
                            <div id="qrPlaceholder" class="qr-placeholder text-muted">
                                <i class="bi bi-qr-code d-block mb-2 icon-placeholder"></i>
                                <span>Nhấn nút cập nhật để tạo mã</span>
                            </div>
                            <canvas id="qrcode" style="display:none"></canvas>
                        </div>

                        <!-- <div class="mt-4 d-flex gap-2">
                            <button class="btn btn-outline-secondary btn-sm px-4 fw-600" onclick="handleAction('download')">
                                <i class="bi bi-download me-1"></i> Lưu ảnh
                            </button>
                            <button class="btn btn-outline-secondary btn-sm px-4 fw-600" onclick="handleAction('print')">
                                <i class="bi bi-printer me-1"></i> In
                            </button>
                        </div> -->
                    </div>
                </div>
            </div>

            <div class="row mt-4">
                <div class="col-12">
                    <div class="card shadow-sm border-0">
                        <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center border-bottom">
                            <h6 class="fw-bold m-0 text-dark">
                                <i class="bi bi-clock-history text-custom me-2"></i>Lịch sử quét mã hôm nay
                            </h6>
                            <span class="text-muted small">Cập nhật lúc: <span id="updateTime" class="fw-medium">--:--:--</span></span>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle m-0">
                                <thead class="table-light text-secondary small">
                                    <tr>
                                        <th class="ps-4" style="width: 80px;">STT</th>
                                        <th style="width: 150px;">MÃ SINH VIÊN</th>
                                        <th>HỌ TÊN SINH VIÊN</th>
                                        <th>THỜI GIAN QUÉT</th>
                                        <th class="text-end pe-4">TRẠNG THÁI</th>
                                    </tr>
                                </thead>
                                <tbody id="checkinTable"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script type="module">
    import { teacherService } from './services/teacherApi.js';

    async function handleStartAttendance() {
        try {
            // Giả sử course_class_id = 1 (Lớp DH24-CNTT01)
            const session = await teacherService.openSession(1);
            
            console.log("Đã mở session ID:", session.id);
            
            // Sau khi mở xong, gọi tiếp hàm lấy dữ liệu live
            const list = await teacherService.getLiveAttendance(session.id);
            console.log("Danh sách sinh viên hiện tại:", list);

        } catch (error) {
            // Xử lý lỗi (Token hết hạn, không có quyền teacher, v.v.)
            if (error.response?.status === 401) {
                alert("Phiên đăng nhập hết hạn, vui lòng login lại!");
                window.location.href = "/login.html";
            } else {
                console.error("Lỗi gọi API:", error.response?.data?.message);
            }
        }
    }

    // Gắn vào nút bấm
    document.getElementById("btnUpdateQR").onclick = handleStartAttendance;
</script>
</body>
</html>
