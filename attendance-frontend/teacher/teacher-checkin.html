                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label small fw-bold text-secondary">Course Class ID</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-hash"></i></span>
                                    <input type="number" id="class-id" class="form-control bg-light border-start-0" placeholder="ID lớp học">
                                </div>
                            </div>

                            <div class="row g-3 mb-4">
                                <div class="col-6">
                                    <label class="form-label small fw-bold text-secondary">Lần điểm danh</label>
                                    <input type="number" id="check-number" class="form-control bg-light" value="1">
                                </div>
                                <div class="col-6">
                                    <label class="form-label small fw-bold text-secondary">Thời gian (phút)</label>
                                    <input type="number" id="duration" class="form-control bg-light" value="15">
                                </div>
                            </div>
                            
                            <button id="btn-open-session" class="btn btn-primary w-100 py-3 fw-bold shadow-sm">
                                <i class="bi bi-qr-code me-2"></i>TẠO MÃ QR TỔNG
                            </button>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                        <div class="card-body p-4">

                            </div>
                            
                            <div id="reader-container" class="position-relative bg-dark rounded-4 mb-3 overflow-hidden" style="aspect-ratio: 4/3;">
                                <div id="reader" style="width: 100%;"></div>
                                <div id="scan-overlay" class="position-absolute top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center d-none">
                                    <div class="spinner-border text-light" role="status"></div>
                                </div>
                            </div>

                            <div id="scan-result" class="text-center p-2 rounded-3 mb-2" style="min-height: 40px;"></div>
                            
                            <button id="btn-toggle-camera" class="btn btn-dark w-100 py-2">
                                <i class="bi bi-camera-fill me-2"></i>BẬT CAMERA QUÉT
                            </button>
                        </div>
                    </div>
                </div>

                <div class="col-xl-8 col-lg-7">
                    <div class="card border-0 shadow-sm rounded-4 h-100 overflow-hidden">
                        <div class="card-header bg-white py-3 border-0 d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="mb-0 fw-bold">Trạng thái điểm danh trực tiếp</h6>
                                <small class="text-muted" id="session-info">Chưa có phiên làm việc</small>
                            </div>
                            <div class="text-end">
                                <span id="live-count" class="badge bg-success fs-6 rounded-pill px-3 py-2">0 / 0</span>
                            </div>
                        </div>
                        
                        <div class="card-body p-0">
                            <div class="table-responsive" style="max-height: 75vh;">
                                <table class="table table-hover align-middle mb-0">
                                    <thead class="bg-light sticky-top">
                                        <tr class="small text-uppercase text-secondary">
                                            <th class="ps-4 py-3">Mã sinh viên</th>
                                            <th>Họ và Tên</th>
                                            <th>Thời điểm</th>
                                            <th>Phương thức</th>
                                            <th class="pe-4 text-end">Trạng thái</th>
                                        </tr>
                                    </thead>
                                    <tbody id="attendance-list" class="small">
                                        <tr>
                                            <td colspan="5" class="text-center py-5">
                                                <img src="https://cdn-icons-png.flaticon.com/512/7486/7486744.png" width="80" class="opacity-25 mb-3"><br>
                                                <span class="text-muted">Đang chờ mở phiên điểm danh...</span>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="qrOverlay">
        <div class="qr-card text-center">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold mb-0">Mã QR Điểm Danh</h4>
                <button id="btn-close-overlay" class="btn-close"></button>
            </div>
            
            <p id="overlay-class-info" class="text-secondary small mb-1">Mã lớp: ...</p>
            <div class="qrcode-wrapper shadow-sm">
                <div id="qrcode"></div>
            </div>
            
            <div class="alert alert-danger border-0 rounded-4 py-2 mb-4">
                <i class="bi bi-clock-history me-2"></i>
                Hết hạn lúc: <span id="display-expiry" class="fw-bold">--:--</span>
            </div>
            
            <button id="btn-close-overlay-large" class="btn btn-dark w-100 py-3 fw-bold rounded-4 shadow">XÁC NHẬN ĐÃ HIỂN THỊ</button>
        </div>
    </div>

    <script src="nav.js"></script>
<script type="module" src="./services/teacher-checkin.js"></script>

<script type="module">
    // 1. IMPORT teacherService
    import { teacherService } from './services/teacherService.js';
    window.teacherService = teacherService;
    
    // 2. HELPER showScanResult
    window.showScanResult = function(message, type = 'info') {
        const resultEl = document.getElementById('scan-result');
        resultEl.innerHTML = message;
        resultEl.className = `text-center p-3 bg-${type === 'success' ? 'success' : 'danger'} text-white fw-bold rounded-3 mb-2`;
        setTimeout(() => {
            resultEl.innerHTML = '';
            resultEl.className = 'text-center p-2 rounded-3 mb-2';
        }, 4000);
    };
    
    // 3. TẠO QR TEST (cập nhật)
    document.getElementById('btn-open-session').onclick = function() {
        const classId = document.getElementById('class-id').value || 1;
        document.getElementById('class-id').value = classId; // Auto fill
        
        // Show QR
        document.getElementById('qrOverlay').classList.add('active');
        document.body.style.overflow = 'hidden';
        
        // QR test sinh viên
        const qrcode = document.getElementById('qrcode');
        qrcode.innerHTML = '';
        new QRCode(qrcode, {
            text: JSON.stringify({
                type: "student",
                student_code: "DH52201279",
                name: "Phạm Uyên Phương"
            }),
            width: 220,
            colorDark: "#157347"
        });
        
        document.getElementById('overlay-class-info').textContent = `Class ID: ${classId}`;
        document.getElementById('display-expiry').textContent = '15 phút';
        
        console.log('✅ QR ready! Class ID:', classId);
        showScanResult('✅ Tạo QR OK! Nhập Class ID = 1 → Bật camera quét!', 'success');
    };
</script>

<script>
// 4. CAMERA SCANNER HOÀN CHỈNH
class QrScanner {
    constructor() {
        this.scanner = null;
        this.init();
    }
    
    init() {
        document.getElementById('btn-toggle-camera').onclick = () => this.toggleCamera();
    }
    
    async toggleCamera() {
        if (this.scanner && this.scanner.isScanning) {
            this.stopCamera();
            return;
        }
        
        try {
            console.log('🔄 Bật camera...');
            this.scanner = new Html5Qrcode("reader");
            
            await this.scanner.start(
                { facingMode: "environment" }, // Camera sau
                { 
                    fps: 10, 
                    qrbox: { width: 250, height: 250 },
                    aspectRatio: 1.0 
                },
                (result) => this.onScan(result),
                (error) => console.log('No QR', error)
            );
            
            // UI Success
            document.getElementById('camera-status').outerHTML = 
                '<span id="camera-status" class="badge bg-success rounded-pill">✅ Đang quét...</span>';
            document.getElementById('btn-toggle-camera').innerHTML = 
                '<i class="bi bi-camera-video-off me-2"></i>TẮT CAMERA';
            showScanResult('✅ Camera OK! Quét QR sinh viên!', 'success');
            
        } catch (err) {
            console.error('Camera error:', err);
            showScanResult('❌ Camera lỗi: ' + err, 'danger');
        }
    }
    
    onScan(result) {
        console.log('📱 QR OK:', result);
        
        try {
            const qrData = JSON.parse(result);
            const sessionId = parseInt(document.getElementById('class-id').value);
            
            if (!sessionId || isNaN(sessionId)) {
                showScanResult('❌ NHẬP SESSION ID = 1 TRƯỚC!', 'danger');
                return;
            }
            
            console.log('📤 Scan:', { session_id: sessionId, student_code: qrData.student_code });
            
            // ✅ GỌI API
            teacherService.scanStudent(sessionId, qrData.student_code)
                .then(data => {
                    console.log('✅ API:', data);
                    showScanResult(
                        `✅ ${data.message}<br><small>${qrData.name}</small>`, 
                        'success'
                    );
                })
                .catch(error => {
                    console.error('❌ API:', error.response?.data || error.message);
                    showScanResult(`❌ ${error.message}`, 'danger');
                });
                
        } catch (e) {
            console.error('Parse error:', e);
            showScanResult('❌ QR không đúng định dạng!', 'danger');
        }
    }
    
    stopCamera() {
        if (this.scanner) {
            this.scanner.stop().then(() => {
                this.scanner.clear();
                document.getElementById('camera-status').outerHTML = 
                    '<span id="camera-status" class="badge bg-secondary rounded-pill">Chưa bật</span>';
                document.getElementById('btn-toggle-camera').innerHTML = 
                    '<i class="bi bi-camera-fill me-2"></i>BẬT CAMERA QUÉT';
                showScanResult('', 'info');
            });
        }
    }
}

// 5. INIT
document.addEventListener('DOMContentLoaded', () => {
    window.scanner = new QrScanner();
    
    // Close QR
    document.querySelectorAll('#btn-close-overlay, #btn-close-overlay-large').forEach(btn => {
        btn.onclick = () => {
            document.getElementById('qrOverlay').classList.remove('active');
            document.body.style.overflow = '';
        };
    });
    
    // Default
    document.getElementById('class-id').value = 1; // Auto fill
    document.getElementById('scan-result').textContent = 'Nhập Session ID → Tạo QR → Bật camera';
});
</script>
