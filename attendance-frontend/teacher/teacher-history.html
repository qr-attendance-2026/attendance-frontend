<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử giảng dạy | SAMS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https://api-attendance-backend-520975280881.asia-southeast1.run.app https://cdn.jsdelivr.net https://fonts.gstatic.com; 
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; 
        style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; 
        connect-src 'self' https://api-attendance-backend-520975280881.asia-southeast1.run.app https://cdn.jsdelivr.net;">
<link rel="stylesheet" href="./css/style.css"> 
<link rel="stylesheet" href="./css/history.css">
</head>

<body class="bg-light">
<script src="./nav.js" type="module"></script>    <div class="content">
        <div class="container-fluid">
            <div class="row mb-4">
                <div class="col-12">
                    <h1 class="page-title mb-1">Lịch sử giảng dạy</h1>
                    <p class="page-subtitle"><i class="bi bi-calendar-check me-1"></i> Quản lý và theo dõi báo cáo điểm danh theo từng lớp</p>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-lg-4">
                    <div class="sticky-top" style="top: 100px; z-index: 10;">
                        <h6 class="fw-bold mb-3 text-secondary small text-uppercase letter-spacing-1">Lớp học đang đảm nhiệm</h6>
                        <div id="history-list" class="d-grid gap-2 custom-scrollbar" style="max-height: 75vh; overflow-y: auto; padding-right: 5px;">
                            </div>
                    </div>
                </div>

                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm overflow-hidden" style="border-radius: 16px;">
                        <div class="card-header bg-white py-3 border-bottom d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="fw-bold mb-0 text-dark" id="detailTitle">Chi tiết báo cáo</h6>
                                <small class="text-muted" id="detailSubtitle">Thông tin điểm danh phiên gần nhất</small>
                            </div>
                            <button id="exportBtn" class="btn btn-sm btn-green d-none px-3" onclick="exportToExcel()">
                                <i class="bi bi-file-earmark-excel me-1"></i> Xuất Excel
                            </button>
                        </div>

                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead>
                                    <tr>
                                        <th class="ps-4">Mã sinh viên</th>
                                        <th>Họ và tên</th>
                                        <th class="text-center">Trạng thái</th>
                                    </tr>
                                </thead>
                                <tbody id="attendanceTableBody">
                                    <tr>
                                        <td colspan="3" class="text-center py-5">
                                            <div class="text-muted py-4">
                                                <i class="bi bi-arrow-left-circle display-6 d-block mb-3 opacity-25"></i>
                                                Chọn một lớp học từ danh sách để xem chi tiết
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // GIỮ NGUYÊN IMPORT NHƯ YÊU CẦU
        import { teacherHistoryService } from './services/historyService.js';

        async function initPage() {
            const listNode = document.getElementById('history-list');
            listNode.innerHTML = '<div class="text-center py-4"><div class="spinner-border text-success opacity-50"></div></div>';

            try {
                const res = await teacherHistoryService.getClasses();
                const classes = res.data;

                if (!classes || classes.length === 0) {
                    listNode.innerHTML = '<div class="alert alert-info border-0 shadow-sm">Bạn chưa được phân công lớp nào.</div>';
                    return;
                }

                listNode.innerHTML = classes.map(c => `
                    <div class="card border-0 shadow-sm list-item-card hover-card" 
                         onclick="handleClassClick(this, ${c.id}, '${c.class_code}', '${c.subject?.subject_name || 'Môn học'}')">
                        <div class="card-body p-3" style="cursor: pointer;">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="badge badge-green-light">Nhóm: ${c.class_code}</span>
                                <span class="small text-muted fw-500">HK ${c.semester}</span>
                            </div>
                            <h6 class="fw-bold mb-0 text-dark text-truncate">${c.subject?.subject_name || 'Chưa cập nhật'}</h6>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                listNode.innerHTML = '<div class="alert alert-danger border-0">Không thể kết nối máy chủ.</div>';
            }
        }

        // Xử lý hiệu ứng click và gọi dữ liệu
        window.handleClassClick = (element, id, classCode, subjectName) => {
            // Xóa trạng thái active cũ
            document.querySelectorAll('.list-item-card').forEach(card => card.classList.remove('active-card'));
            // Thêm trạng thái active mới
            element.classList.add('active-card');
            
            fetchDetails(id, classCode, subjectName);
        }

        window.fetchDetails = async (id, classCode, subjectName) => {
            const tbody = document.getElementById('attendanceTableBody');
            const exportBtn = document.getElementById('exportBtn');
            
            document.getElementById('detailTitle').innerText = `Nhóm: ${classCode}`;
            document.getElementById('detailSubtitle').innerText = subjectName;
            
            tbody.innerHTML = '<tr><td colspan="3" class="text-center py-5"><div class="spinner-border text-success"></div></td></tr>';

            try {
                const res = await teacherHistoryService.getReport(id);
                const { sessions, students } = res.data;

                if (!sessions || sessions.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="text-center py-5 text-muted">Chưa có dữ liệu phiên điểm danh.</td></tr>';
                    exportBtn.classList.add('d-none');
                    return;
                }

                exportBtn.classList.remove('d-none');
                const sId = sessions[sessions.length - 1].id.toString();

                tbody.innerHTML = students.map(s => {
                    const isPresent = s.attendance[sId] === "present";
                    return `
                    <tr class="align-middle">
                        <td class="ps-4 fw-bold text-dark">${s.student_code}</td>
                        <td>${s.name || 'N/A'}</td>
                        <td class="text-center">
                            <span class="status-pill ${isPresent ? 'status-present' : 'status-absent'}">
                                <i class="bi ${isPresent ? 'bi-check-circle-fill' : 'bi-dash-circle-fill'} me-1"></i>
                                ${isPresent ? 'Có mặt' : 'Vắng'}
                            </span>
                        </td>
                    </tr>`;
                }).join('');
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="3" class="text-center text-danger py-5">Lỗi tải dữ và hiển thị dữ liệu.</td></tr>';
            }
        };

        window.exportToExcel = () => {
            const table = document.querySelector("table");
            const wb = XLSX.utils.table_to_book(table);
            const name = document.getElementById('detailTitle').innerText;
            XLSX.writeFile(wb, `SAMS_Bao_cao_${name}.xlsx`);
        };

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
