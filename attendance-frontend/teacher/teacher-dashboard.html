<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giảng viên | Quản lý lịch dạy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="/attendance-frontend/teacher/nav.js"></script>
    <link rel="stylesheet" href="/attendance-frontend/teacher/css/style.css">
    <link rel="stylesheet" href="/attendance-frontend/teacher/css/dashboard.css">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https://api-attendance-backend-520975280881.asia-southeast1.run.app https://cdn.jsdelivr.net https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com;">
</head>

<body>

    <div class="main-content">
        <div class="container py-4">
            <div class="row mb-5 align-items-end">
                <div class="col-md-7">
                    <h6 class="text-primary fw-bold text-uppercase mb-1 text-ls-2">Trình quản lý giảng dạy</h6>
                    <h2 class="fw-bold mb-0" id="teacherName">Đang tải...</h2>
                </div>
                <div class="col-md-5 text-md-end">
                    <div class="d-inline-flex align-items-center bg-white p-2 rounded-4 shadow-sm border">
                        <div class="px-3 text-start">
                            <div class="small text-muted fw-medium">Hôm nay</div>
                            <div class="fw-bold text-dark" id="todayDate">...</div>
                        </div>
                        <div class="bg-primary text-white px-3 py-2 rounded-3 ms-2 fw-bold" id="currentTime">00:00:00
                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-lg-11 mx-auto">
                    <div class="d-flex align-items-center mb-4">
                        <h5 class="fw-bold mb-0 text-dark">Danh sách lớp giảng dạy</h5>
                    </div>
                    <div id="schedule-list" class="d-grid gap-3"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { dashboardService } from './services/dashboardService.js';
        window.dashboardService = dashboardService;

        async function initDashboard() {
            const teacherNameElement = document.getElementById('teacherName');
            const scheduleContainer = document.getElementById('schedule-list');

            const savedName = localStorage.getItem('teacher_name');
            if (savedName && teacherNameElement) {
                teacherNameElement.innerText = savedName;
            }

            try {
                const response = await window.dashboardService.getTeacherStats();
                console.log("Dữ liệu API trả về:", response);

                const teacherData = response.data?.teacher || response.teacher;
                if (teacherData && teacherNameElement) {
                    teacherNameElement.innerText = teacherData.name;
                    localStorage.setItem('teacher_name', teacherData.name);
                }

                const classes = response.data || response;

                if (scheduleContainer) {
                    renderSchedule(Array.isArray(classes) ? classes : [], scheduleContainer);
                }

            } catch (error) {
                console.error("❌ Lỗi tải dữ liệu:", error);
                if (scheduleContainer) {
                    scheduleContainer.innerHTML = `
                    <div class="alert alert-danger rounded-4">
                        Không thể kết nối máy chủ. Vui lòng thử lại sau.
                    </div>`;
                }
            }
        }

        function renderSchedule(classes, container) {
    if (classes.length === 0) {
        container.innerHTML = `
            <div class="text-center py-5 bg-white rounded-4 shadow-sm">
                <i class="bi bi-calendar-x text-muted" style="font-size: 3rem;"></i>
                <p class="mt-3 text-muted">Hôm nay bạn không có lịch dạy.</p>
            </div>`;
        return;
    }

    container.innerHTML = classes.map(item => {
        const subjectName = item.subject?.subject_name || "Môn học chưa xác định";
        
        // Xử lý hiển thị phòng học (Không set cứng B01 nữa)
        let roomDisplay = "Chưa xếp phòng";
        if (item.room) {
            roomDisplay = item.room.name || item.room.room_code;
        } else if (item.schedules?.[0]) {
            roomDisplay = item.schedules[0].room || item.schedules[0].location || "Chờ cập nhật";
        }

        // Lấy số lượng sinh viên
        const studentCount = item.students_count || item.students?.length || 0;

        return `
        <div class="card border-0 shadow-sm rounded-4 mb-3 card-hover">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <div class="badge bg-primary-subtle text-primary mb-2">Mã lớp: ${item.class_code}</div>
                        <h5 class="fw-bold mb-1 text-dark">${subjectName}</h5>
                        
                        <div class="text-muted small mt-2 d-flex gap-3">
                            <span>
                                <i class="bi bi-geo-alt-fill text-danger"></i> 
                                Phòng: <span class="text-dark fw-bold">${roomDisplay}</span>
                            </span>
                            <span>
                                <i class="bi bi-people-fill text-primary"></i> 
                                Sĩ số: <span class="text-dark fw-bold">${studentCount}</span>
                            </span>
                        </div>
                    </div>
                    <div class="text-end">
                        <button class="btn btn-primary rounded-pill px-4 fw-semibold shadow-sm" 
                                onclick="window.location.href='teacher-checkin.html?class_id=${item.id}'">
                            <i class="bi bi-qr-code-scan me-2"></i> Điểm danh
                        </button>
                    </div>
                </div>
            </div>
        </div>`;
    }).join('');
}
        function updateDateTime() {
            const now = new Date();
            if (document.getElementById('currentTime'))
                document.getElementById('currentTime').innerText = now.toLocaleTimeString('vi-VN');
            if (document.getElementById('todayDate'))
                document.getElementById('todayDate').innerText = now.toLocaleDateString('vi-VN', {
                    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
                });
        }

        setInterval(updateDateTime, 1000);
        updateDateTime();
        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>

</html>
