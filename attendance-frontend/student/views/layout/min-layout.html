<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Layout</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../public/css/home.css">
</head>

<body class="bg-main">

<div class="d-flex">

    <!-- SIDEBAR -->
    <div id="sidebar-container"></div>

    <!-- CONTENT -->
    <div class="content p-4 w-100 text-white" id="main-content">
        <!-- Nội dung trang sẽ chèn vào -->
    </div>

</div>

<script>
    // load sidebar
    fetch("../layout/sidebar.html")
        .then(res => res.text())
        .then(data => {
            document.getElementById("sidebar-container").innerHTML = data;
        });
</script>

</body>
</html>
