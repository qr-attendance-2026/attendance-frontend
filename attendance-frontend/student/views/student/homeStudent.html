<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang chủ Sinh viên</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../public/css/homeStudent.css">
    <link rel="stylesheet" href="../../public/css/sidebar.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <script src="../../public/js/sidebar.js"></script>
</head>

<body class="bg-main">
<div class="d-flex">
    <div id="sidebar-container"></div>

    <div class="content w-100 text-dark">
        <div class="container-fluid p-5"> 
            
            <div class="d-flex justify-content-between align-items-center mb-5 border-bottom pb-4 border-secondary border-opacity-25">
                <div>
                    <h2 class="fw-light mt-0 mb-0 greeting-text">Xin chào, <span id="student-name" class="fw-bold text-brown">...</span></h2>
                </div>
                <div class="clock-minimal d-flex align-items-center">
                    <i class="far fa-clock me-2"></i>
                    <div id="dongHo">00:00:00</div>
                </div>
            </div>

            <div class="row g-4 mb-4">
                <div class="col-md-6">
                    <div class="pro-card" onclick="location.href='scanQR.html'">
                        <div class="card-content">
                            <span class="card-label">MÁY QUÉT</span>
                            <h3>QUÉT MÃ QR</h3>
                            <p>Xác nhận sự có mặt trong lớp học</p>
                        </div>
                        <div class="card-arrow">→</div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="pro-card" onclick="location.href='studentQR.html'">
                        <div class="card-content">
                            <span class="card-label">CÁ NHÂN</span>
                            <h3>QR CỦA TÔI</h3>
                            <p>Dùng để giảng viên quét thủ công</p>
                        </div>
                        <div class="card-arrow">→</div>
                    </div>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-12">
                    <div class="bg-white p-4 rounded-4 shadow-sm border-0">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h5 class="fw-bold text-brown mb-0">LỊCH HỌC HÔM NAY</h5>
                            <span class="text-muted small">
                                <script>
                                    document.write(new Date().toLocaleDateString('vi-VN', { weekday: 'long', day: 'numeric', month: 'long' }));
                                </script>
                            </span>
                        </div>
                        <div id="today-schedule">
                            <div class="text-center py-3">
                                <div class="spinner-border spinner-border-sm text-brown" role="status"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
<script type="module">
    // Gán vào window để biến nó thành hàm toàn cục (global)
    window.getUser = () => {
        const user = localStorage.getItem('user_info');
        try {
            return user ? JSON.parse(user) : null;
        } catch (e) {
            console.error("Lỗi parse user_info:", e);
            return null;
        }
    };

    document.addEventListener("DOMContentLoaded", () => {
        const user = window.getUser();
        const nameElement = document.getElementById('student-name');
        if (user && nameElement) {
            nameElement.innerText = user.name || "Sinh viên";
        }
    });
</script>
<script type="module" src="../../public/js/homeStudent.js"></script>
</body>
</html>
