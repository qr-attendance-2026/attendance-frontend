<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang chủ Sinh viên</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../public/css/homeStudent.css">
    <link rel="stylesheet" href="../../public/css/sidebar.css">
    <script src="../../public/js/sidebar.js"></script>

</head>

<body class="bg-main">

<div class="d-flex">
    <div id="sidebar-container"></div>

    <div class="content w-100 text-white">
        <div class="container-fluid p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h3 class="fw-bold">Xin chào, <span id="student-name">Sinh viên</span> 👋</h3>
                    <small class="text-light opacity-75">Hệ thống điểm danh STU</small>
                </div>
                <div id="dongHo" class="clock"></div>
            </div>

            <div class="row g-4">
                <div class="col-md-6">
                    <div class="action-card action-red" onclick="location.href='scan-qr.html'">
                        <div class="icon">📷</div>
                        <h4>Quét QR</h4>
                        <p>Điểm danh ngay lập tức</p>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="action-card action-outline" onclick="location.href='my-qr.html'">
                        <div class="icon">📱</div>
                        <h4>QR cá nhân</h4>
                        <p>Hiển thị mã của bạn</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module" src="./views/student/homeStudent.js"></script>
</body>
</html>
