<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quét QR Điểm Danh</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../public/css/homeStudent.css">
    <link rel="stylesheet" href="../../public/css/sidebar.css">
    <link rel="stylesheet" href="../../public/css/scanQR.css">
    <script src="../../public/js/sidebar.js"></script>
    


</head>

<body class="bg-main">

<div class="d-flex">
    <div id="sidebar-container"></div>

    <div class="content w-100 text-white">
        <div class="container-fluid p-4">
            <h3 class="fw-bold">Quét mã QR điểm danh</h3>
            <p class="text-light opacity-75">Đưa mã QR vào khung để điểm danh</p>

            <div class="scanner-wrapper">
                <div class="scanner-box">
                    <div id="reader"></div>

                    <div id="camera-off">
                        <div class="icon">📷</div>
                        <p>Camera chưa được bật</p>
                    </div>

                    <div id="scanEffect" class="d-none">
                        <div class="corner tl"></div><div class="corner tr"></div>
                        <div class="corner bl"></div><div class="corner br"></div>
                        <div class="scan-line"></div>
                    </div>
                </div>
            </div>

            <div class="text-center mt-4">
                <button id="btnCamera" class="btn btn-danger px-4">
                    🎥 Bật camera
                </button>
            </div>

            <div class="text-center mt-3">
                <div id="statusBox" class="alert alert-warning d-inline-block">
                    Chưa quét QR
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="./scanQR.js"></script>

</body>
</html>
