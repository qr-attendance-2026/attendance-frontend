<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quét QR Điểm Danh</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../public/css/homeStudent.css">
    <link rel="stylesheet" href="../../public/css/sidebar.css">
    <link rel="stylesheet" href="../../public/css/scanQR.css">
    <script src="../../public/js/sidebar.js"></script>
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


</head>

<body class="bg-light-beige">
    <div class="d-flex">
        <div id="sidebar-container"></div>

        <div class="content w-100">
            <div class="container-fluid p-4">
                <div class="mb-4">
                    <h3 class="fw-bold text-brown">Quét mã QR điểm danh</h3>
                    <p class="text-brown-muted small">Vui lòng đưa mã QR vào khung máy ảnh để hệ thống ghi nhận</p>
                </div>

                <div class="scanner-wrapper shadow-sm">
                    <div class="scanner-box">
                        <div id="reader"></div>

                        <div id="camera-off" class="text-center">
                            <div class="camera-icon mb-3">
                                <i class="fas fa-camera"></i>
                            </div>
                            <p class="fw-bold text-brown-muted">Camera hiện đang tắt</p>
                            <small class="text-muted">Nhấn nút bên dưới để bắt đầu quét</small>
                        </div>

                        <div id="scanEffect" class="d-none">
                            <div class="corner tl"></div><div class="corner tr"></div>
                            <div class="corner bl"></div><div class="corner br"></div>
                            <div class="scan-line"></div>
                        </div>
                    </div>
                </div>

      <div class="d-flex flex-column align-items-center mt-4">
    <button id="btnCamera" class="btn btn-brown px-5 py-2 shadow-sm fw-bold">
        <i class="fas fa-video me-2"></i> Bật camera
    </button>
    
    <div class="mt-4">
        <div id="statusBox" class="status-badge status-waiting">
            <i class="fas fa-info-circle me-1"></i> Hệ thống sẵn sàng
        </div>
    </div>
</div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script type="module" src="../../public/js/scanQR.js"></script>
</body>
</html>
