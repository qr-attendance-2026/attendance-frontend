<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử điểm danh - STU</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="../../public/css/homeStudent.css">
    <link rel="stylesheet" href="../../public/css/sidebar.css">
    <link rel="stylesheet" href="../../public/css/historyStudent.css">
    <script src="../../public/js/sidebar.js"></script>
</head>
<body class="bg-main text-white">
    <div class="main-wrapper d-flex">
        <div id="sidebar-container"></div>

        <main class="content-body p-4 flex-grow-1">
            <h2 class="fw-bold mb-4 text-uppercase">Lịch sử điểm danh</h2>

            <div class="mb-5">
                <h5 class="text-white-50 mb-3"><i class="fas fa-chart-pie me-2"></i>Tiến độ chuyên cần</h5>
                <div class="row g-3" id="summaryBox">
                    <div class="col-12 text-center text-white-50 small py-4">
                        <div class="spinner-border text-danger spinner-border-sm me-2" role="status"></div>
                        Đang tải thống kê...
                    </div>
                </div>
            </div>

            <div class="filter-panel p-4 mb-4 shadow" style="background: rgba(0,0,0,0.2); border-radius: 15px;">
                <div class="row g-3">
                    <div class="col-lg-10">
                        <label class="small text-white-50 mb-1">TÌM KIẾM</label>
                        <input type="text" id="searchInput" class="form-control custom-input" placeholder="Nhập tên môn học hoặc giảng viên...">
                    </div>
                    <div class="col-lg-2 d-flex align-items-end">
                        <button class="btn btn-danger w-100 fw-bold py-2 shadow" id="btnFilter">
                            <i class="fas fa-search me-1"></i> LỌC
                        </button>
                    </div>
                </div>
            </div>

            <div class="table-card shadow-lg" style="background: rgba(255,255,255,0.02); border-radius: 15px; overflow: hidden;">
                <div class="table-responsive">
                    <table class="table table-dark table-hover mb-0 align-middle">
                        <thead>
                            <tr class="text-white-50" style="background: rgba(255,255,255,0.05);">
                                <th class="ps-4 py-3">NGÀY</th>
                                <th class="py-3">MÔN HỌC / LỚP</th>
                                <th class="py-3">CA HỌC</th>
                                <th class="py-3">GIẢNG VIÊN</th>
                                <th class="text-center py-3">TRẠNG THÁI</th>
                            </tr>
                        </thead>
                        <tbody id="attendanceTable">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mt-4">
                <span id="showingResult" class="text-white-50 small mb-2 mb-md-0"></span>
                <nav id="paginationBox"></nav>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../../public/js/historyStudent.js"></script>
</body>
</html>
