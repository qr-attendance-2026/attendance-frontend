<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử điểm danh - STU</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="../../public/css/homeStudent.css">
    <link rel="stylesheet" href="../../public/css/sidebar.css">
    <link rel="stylesheet" href="../../public/css/historyStudent.css">
    
    <script src="../../public/js/sidebar.js"></script>
</head>
<body class="bg-light-beige"> <div class="main-wrapper d-flex">
        <div id="sidebar-container"></div>

        <main class="content-body p-4 flex-grow-1">
            <h2 class="fw-bold mb-4 text-brown text-uppercase">Lịch sử điểm danh</h2>

            <div class="mb-5">
                <h6 class="text-brown-muted mb-3 tracking-wide">TIẾN ĐỘ CHUYÊN CẦN</h6>
                <div class="row g-3" id="summaryBox">
                    <div class="col-1   2 text-center py-4">
                        <div class="spinner-border text-brown spinner-border-sm me-2" role="status"></div>
                        <span class="text-brown-muted">Đang kết nối hệ thống...</span>
                    </div>
                </div>
            </div>

            <div class="filter-panel p-4 mb-4 shadow-sm border-0">
                <form id="filterForm" class="row g-3">
                    <div class="col-lg-10">
                        <label class="label-sub mb-1">TÌM KIẾM MÔN HỌC</label>
                        <input type="text" id="searchInput" class="form-control custom-input" placeholder="Nhập tên môn học hoặc giảng viên...">
                    </div>
                    <div class="col-lg-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-brown w-100 fw-bold py-2 shadow-sm">
                             LỌC
                        </button>
                    </div>
                </form>
            </div>

            <div class="table-card-light shadow-sm">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 align-middle">
                        <thead>
                            <tr class="table-header-light">
                                <th class="ps-4 py-3">NGÀY</th>
                                <th class="py-3">MÔN HỌC / LỚP</th>
                                <th class="py-3">GIẢNG VIÊN</th>
                                <th class="text-center py-3">TRẠNG THÁI</th>
                            </tr>
                        </thead>
                        <tbody id="attendanceTable">
                            <tr>
                                <td colspan="4" class="text-center py-5 text-muted small">Đang tải dữ liệu từ máy chủ...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
<script type="module" src="../../public/js/historyStudent.js"></script></html>
