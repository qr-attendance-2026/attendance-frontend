<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Cá Nhân | SAMS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="../../public/css/homeStudent.css">
    <link rel="stylesheet" href="../../public/css/sidebar.css">
    <link rel="stylesheet" href="../../public/css/studentQR.css">
        <script type="module" src="../../public/js/sidebar.js"></script>

</head>

<body class="bg-light-beige">
    <div class="d-flex">
        <div id="sidebar-container"></div>

        <div class="content flex-grow-1">
            <div class="container py-4 text-center">
                <div class="alert alert-danger shadow-sm mx-auto warning-box" style="max-width: 500px;">
                    <i class="fas fa-exclamation-triangle me-2"></i>
                    Mã QR dùng để giảng viên quét điểm danh. Không chia sẻ cho người khác.
                </div>

                <div id="capture-area" class="student-card mx-auto shadow">
                    <div class="card-top text-center">
                        <h5 class="card-title mb-1">THẺ SINH VIÊN</h5>
                        <small class="card-subtitle">SAMS ATTENDANCE SYSTEM</small>
                    </div>

                    <div class="card-body-custom">
                        <div id="qrcode" class="qr-box mb-3 d-flex align-items-center justify-content-center" style="min-height: 220px;">
                            <div class="spinner-border text-brown" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                        </div>

                        <h4 id="tenSV" class="student-name">ĐANG TẢI...</h4>
                        <div id="mssv" class="student-id"></div>
                        
                        <div id="lop" class="class-badge mt-2">
                            ĐANG TẢI LỚP...
                        </div>
                    </div>

                    <div class="card-footer-custom">
                        <small>Đưa mã này cho giảng viên quét để điểm danh</small>
                    </div>
                </div>

                <div class="mt-4 d-flex justify-content-center gap-3">
                    <button class="btn btn-download" id="btnDownload">
                        <i class="fas fa-download me-2"></i>Tải thẻ
                    </button>
                    <button class="btn btn-zoom" id="btnZoom">
                        <i class="fas fa-search-plus me-2"></i>Phóng to mã
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="zoomModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content modal-qr-zoom">
                <div class="modal-header border-0">
                    <h5 class="text-brown fw-bold">Mã QR Cá Nhân</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body d-flex justify-content-center p-5">
                    <div id="zoomContent" class="bg-white p-3 rounded shadow-sm"></div>
                </div>
                <div class="modal-footer border-0 justify-content-center">
                    <small class="text-muted">Đưa mã này cho giảng viên quét để điểm danh</small>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script type="module" src="../../public/js/studentQR.js"></script>
</body>
</html>
