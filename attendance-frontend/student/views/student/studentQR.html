<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Cá Nhân</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../../public/css/homeStudent.css">
    <link rel="stylesheet" href="../../public/css/sidebar.css">
    <link rel="stylesheet" href="../../public/css/my-qr.css">
    <script src="../../public/js/sidebar.js"></script>
</head>

<body class="bg-main">
<div class="d-flex">
    <div id="sidebar-container"></div> 

    <div class="content w-100 text-white">
        <div class="container-fluid p-4 text-center">
            <div class="alert alert-warning mb-4 shadow-sm mx-auto" style="max-width: 450px;">
                ⚠️ Mã QR này là duy nhất. Không chia sẻ để tránh bị điểm danh hộ.
            </div>

            <div id="capture-area" class="qr-card mx-auto shadow-lg bg-white text-dark p-4" style="border-radius: 15px; max-width: 400px;">
                <div class="qr-header-title fw-bold text-primary mb-2">THẺ SINH VIÊN ĐIỆN TỬ</div>
                <div class="qr-divider" style="height: 2px; background: #eee; margin-bottom: 20px;"></div>
                
                <div id="qrcode" class="d-flex justify-content-center my-3"></div>

                <div class="student-details pb-3">
                    <h4 id="tenSV" class="fw-bold text-uppercase mb-1"></h4>
                    <p id="mssv" class="text-danger fw-bold mb-1" style="font-size: 1.2rem;"></p>
                    <span id="lop" class="badge bg-secondary px-3 py-2">STU Student</span>
                </div>
            </div>

            <div class="mt-4 d-flex justify-content-center gap-3">
                <button class="btn btn-primary px-4 shadow" id="btnDownload">⬇ Tải xuống thẻ</button>
                <button class="btn btn-success px-4 shadow" id="btnZoom">🔍 Phóng to</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script type="module" src="./my-qr.js"></script>

<div class="modal fade" id="zoomModal" tabindex="-1">
    <div class="modal-dialog modal-fullscreen">
        <div class="modal-content bg-dark d-flex justify-content-center align-items-center">
            <div id="zoomContent" class="bg-white p-4 rounded"></div>
            <button class="btn btn-light position-absolute top-0 end-0 m-4" data-bs-dismiss="modal">✖ Đóng</button>
        </div>
    </div>
</div>
</body>
</html>
