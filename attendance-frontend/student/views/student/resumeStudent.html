<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ cá nhân</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../public/css/homeStudent.css">
    <link rel="stylesheet" href="../../public/css/resumeStudent.css">
        <link rel="stylesheet" href="../../public/css/sidebar.css">
    <script src="../../public/js/sidebar.js"></script>
</head>

<body class="bg-main">

<div class="d-flex">
    <div id="sidebar-container"></div>

    <div class="content w-100 text-white">
        <div class="container-fluid p-4">
            <h3 class="fw-bold">Hồ sơ cá nhân</h3>
            <small class="text-light opacity-75">Quản lý thông tin tài khoản của bạn</small>

            <div class="row mt-4 g-4">
                <div class="col-md-4">
                    <div class="profile-card text-center p-4 shadow-sm" style="background: rgba(255,255,255,0.05); border-radius: 15px;">
                        <div class="avatar mx-auto" id="profile-avatar" style="width: 80px; height: 80px; background: #d32f2f; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold;">--</div>
                        
                        <h4 class="mt-3 mb-1" id="display-name">Đang tải...</h4>
                        <p class="text-light opacity-75 mb-1" id="display-mssv">........</p>
                        <small class="badge bg-secondary" id="display-class">Lớp</small>

                        <button id="btnEdit" class="btn btn-outline-danger mt-4 w-100">
                            ✏️ Chỉnh sửa thông tin
                        </button>
                    </div>
                </div>

                <div class="col-md-8">
                    <div class="info-card p-4 shadow-sm" style="background: rgba(255,255,255,0.05); border-radius: 15px;">
                        <h5 class="mb-4">Thông tin chi tiết</h5>

                        <form id="formHoSo">
                            <div class="mb-3">
                                <label class="form-label">Họ và tên</label>
                                <input type="text" id="full-name" class="form-control bg-dark text-white border-secondary" readonly>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Mã sinh viên</label>
                                <input type="text" id="student-code" class="form-control bg-dark text-white border-secondary" readonly>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Số điện thoại</label>
                                <input type="text" id="phone" class="form-control editable" disabled placeholder="Chưa cập nhật">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Địa chỉ</label>
                                <textarea id="address" class="form-control editable" disabled placeholder="Chưa cập nhật"></textarea>
                            </div>

                            <div id="action-buttons" class="d-none">
                                <button type="submit" class="btn btn-success px-4">💾 Lưu thay đổi</button>
                                <button type="button" id="btnCancel" class="btn btn-link text-white">Hủy</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="./resumeStudent.js"></script>

</body>
</html>
