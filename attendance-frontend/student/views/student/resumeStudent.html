<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ cá nhân | STU</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../../public/css/homeStudent.css">
    <link rel="stylesheet" href="../../public/css/resumeStudent.css">
    <link rel="stylesheet" href="../../public/css/sidebar.css">
</head>

<body class="bg-light-beige">
    <div class="d-flex">
        <div id="sidebar-container"></div>

        <div class="content w-100 p-4">
            <div class="container-fluid">
                <div class="mb-4">
                    <h3 class="fw-bold text-brown">Hồ sơ cá nhân</h3>
                    <p class="text-brown-muted small mb-0">Quản lý thông tin định danh và liên lạc của bạn</p>
                </div>

                <div class="row g-4">
                    <div class="col-md-4">
                        <div class="profile-card text-center shadow-sm">
                            <div class="avatar mx-auto mb-3" id="profile-avatar">--</div>
                            <h4 class="fw-bold text-brown mb-1" id="display-name">Đang tải...</h4>
                            <p class="text-muted small mb-2" id="display-mssv">........</p>
                            <span class="badge badge-class" id="display-class">Lớp</span>
                            
                            <div class="border-top mt-4 pt-4">
                                <button id="btnEdit" class="btn btn-edit-outline w-100">
                                    <i class="fas fa-user-edit me-2"></i>Cập nhật thông tin
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-8">
                        <div class="info-card shadow-sm">
                            <h5 class="fw-bold text-brown mb-4">Thông tin chi tiết</h5>

                            <form id="formHoSo">
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="label-sub mb-1">HỌ VÀ TÊN</label>
                                        <input type="text" id="name" class="form-control custom-input bg-light" readonly>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="label-sub mb-1">MÃ SINH VIÊN</label>
                                        <input type="text" id="student_code" class="form-control custom-input bg-light" readonly>
                                    </div>
                                    <div class="col-md-12 mb-3">
                                        <label class="label-sub mb-1">EMAIL SINH VIÊN</label>
                                        <input type="email" id="email" class="form-control custom-input bg-light" readonly>
                                    </div>

                                    <div class="col-md-6 mb-3">
                                        <label class="label-sub mb-1">NGÀY SINH</label>
                                        <input type="text" id="date_of_birth" class="form-control custom-input bg-light" readonly>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="label-sub mb-1">GIỚI TÍNH</label>
                                        <input type="text" id="gender" class="form-control custom-input bg-light" readonly>
                                    </div>

                                    <hr class="my-4 opacity-50">

                                    <div class="col-md-6 mb-3">
                                        <label class="label-sub mb-1 text-primary">SỐ ĐIỆN THOẠI *</label>
                                        <input type="text" id="phone_number" class="form-control custom-input editable" placeholder="Nhập số điện thoại">
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="label-sub mb-1 text-primary">LỚP SINH HOẠT *</label>
                                        <input type="text" id="cohort_class" class="form-control custom-input editable" placeholder="VD: DH520001">
                                    </div>

                                    <div id="edit-actions" class="col-12 mt-4 text-end d-none">
                                        <button type="button" id="btnCancel" class="btn btn-link text-muted me-3 text-decoration-none">Hủy bỏ</button>
                                        <button type="submit" class="btn btn-brown px-5 py-2 shadow-sm">LƯU THAY ĐỔI</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../public/js/sidebar.js"></script>
    <script type="module" src="../../public/js/resumeStudent.js"></script>
</body>
</html>
