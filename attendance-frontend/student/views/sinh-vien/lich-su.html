<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử điểm danh - STU</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../../public/css/home.css">
    <link rel="stylesheet" href="../../public/css/history.css">
    <style>
        /* CSS Riêng cho thẻ thống kê (Dashboard) */
        .card-summary {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
            backdrop-filter: blur(10px);
        }
        .card-summary:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body class="bg-main text-white">
    <div class="main-wrapper d-flex">
        <div id="sidebar-container"></div>

        <main class="content-body p-4 flex-grow-1">
            <h2 class="fw-bold mb-4 text-uppercase">Lịch sử điểm danh</h2>

            <div class="mb-5">
                <h5 class="text-white-50 mb-3"><i class="fas fa-chart-pie me-2"></i>Tiến độ chuyên cần</h5>
                <div class="row g-3" id="summaryBox">
                    <div class="col-12 text-center text-white-50 small py-4">
                        <div class="spinner-border text-danger spinner-border-sm me-2" role="status"></div>
                        Đang tải thống kê...
                    </div>
                </div>
            </div>

            <div class="filter-panel p-4 mb-4 shadow">
                <div class="row g-3">
                    <div class="col-lg-10">
                        <label class="small text-white-50 mb-1">TÌM KIẾM</label>
                        <input type="text" id="searchInput" class="form-control custom-input" placeholder="Nhập tên môn học hoặc giảng viên...">
                    </div>
                    <div class="col-lg-2 d-flex align-items-end">
                        <button class="btn btn-danger w-100 fw-bold py-2 shadow" onclick="filterData()">
                            <i class="fas fa-search me-1"></i> LỌC
                        </button>
                    </div>
                </div>
            </div>

            <div class="table-card shadow-lg">
                <div class="table-responsive">
                    <table class="table table-dark table-hover mb-0 align-middle">
                        <thead>
                            <tr class="text-white-50">
                                <th class="ps-4">NGÀY</th>
                                <th>MÔN HỌC / LỚP</th>
                                <th>CA HỌC</th>
                                <th>GIẢNG VIÊN</th>
                                <th class="text-center">TRẠNG THÁI</th>
                            </tr>
                        </thead>
                        <tbody id="attendanceTable">
                            <tr>
                                <td colspan="5" class="text-center text-white-50 py-4">Đang tải dữ liệu...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mt-4">
                <span id="showingResult" class="text-white-50 small mb-2 mb-md-0"></span>
                <nav id="paginationBox"></nav>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../public/js/history.js"></script>
</body>
</html>
